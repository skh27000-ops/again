<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — ImatPath</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --stone:#F4F3F0;--stone-2:#EDECEA;--stone-3:#E0DEDB;--stone-4:#C8C5C1;
  --ink:#1A1916;--ink-2:#3D3A36;--ink-3:#5A5750;--ink-4:#8A8780;
  --teal:#0D9488;--teal-2:#0F766E;--teal-pale:#CCFBF1;--teal-faint:#F0FDFB;
  --white:#FFFFFF;--red:#DC2626;--red-faint:#FEF2F2;--amber:#B45309;--amber-pale:#FEF3C7;
  --green:#16a34a;--green-faint:#f0fdf4;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--stone);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
button:focus-visible,a:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(244,243,240,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--stone-3);}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:-0.5px;color:var(--ink);text-decoration:none;}
.logo span{color:var(--teal);}
.btn-ghost{padding:7px 16px;border-radius:8px;border:1.5px solid var(--stone-3);background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;font-weight:600;color:var(--ink-2);cursor:pointer;transition:border-color .18s,color .18s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal);}
.btn-teal{padding:7px 16px;border-radius:8px;border:none;background:var(--teal);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:background .18s,transform .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-teal:hover{background:var(--teal-2);transform:translateY(-1px);}

.page{padding:80px 48px 60px;max-width:1200px;margin:0 auto;}

/* PAGE HEADER */
.page-header{margin-bottom:36px;}
.page-label{display:flex;align-items:center;gap:10px;font-size:0.7rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal);margin-bottom:10px;}
.page-label::before{content:'';display:block;width:16px;height:2px;background:var(--teal);border-radius:1px;}
.page-title{font-size:clamp(2rem,4vw,3rem);font-weight:800;letter-spacing:-1.8px;line-height:1.05;margin-bottom:8px;}
.page-sub{font-size:0.9rem;color:var(--ink-3);line-height:1.6;max-width:520px;}

/* TOP KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:32px;}
.kpi{background:var(--white);border:1px solid var(--stone-3);border-radius:14px;padding:20px;text-align:center;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;}
.kpi.teal::after{background:var(--teal);}
.kpi.green::after{background:var(--green);}
.kpi.amber::after{background:var(--amber);}
.kpi.red::after{background:var(--red);}
.kpi.blue::after{background:#0891b2;}
.kpi-val{font-size:1.9rem;font-weight:800;letter-spacing:-1.2px;color:var(--ink);line-height:1;}
.kpi-lbl{font-size:0.7rem;color:var(--ink-3);margin-top:5px;font-weight:500;}
.kpi-sub{font-size:0.68rem;color:var(--ink-4);margin-top:3px;}

/* GRID */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.analytics-grid.three{grid-template-columns:1fr 1fr 1fr;}
.analytics-grid.full{grid-template-columns:1fr;}
.panel{background:var(--white);border:1px solid var(--stone-3);border-radius:16px;padding:26px;}
.panel.span2{grid-column:span 2;}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.pt{font-size:0.95rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;}
.pt i{color:var(--teal);font-size:0.85rem;}
.ps{font-size:0.75rem;color:var(--ink-4);}

/* SUBJECT CARDS */
.subj-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sc{background:var(--stone);border:1px solid var(--stone-3);border-radius:12px;padding:16px;transition:border-color .2s,transform .15s;}
.sc:hover{border-color:var(--teal);transform:translateY(-1px);}
.sc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sc-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:0.82rem;flex-shrink:0;}
.sc-name{font-size:0.85rem;font-weight:700;color:var(--ink);}
.sc-sec{font-size:0.62rem;color:var(--ink-4);font-weight:600;}
.sc-stats{display:flex;gap:14px;margin-bottom:10px;}
.sc-stat-val{font-size:1.2rem;font-weight:800;letter-spacing:-0.5px;}
.sc-stat-lbl{font-size:0.62rem;color:var(--ink-3);}
.mini-bar{height:4px;background:var(--stone-3);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.22,1,.36,1);}
.sc-acc-badge{display:inline-flex;align-items:center;gap:4px;font-size:0.68rem;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:8px;}

/* SCORE PREDICTOR */
.score-card{background:linear-gradient(135deg,var(--ink) 0%,#2D2B27 100%);border-radius:16px;padding:28px;color:var(--white);position:relative;overflow:hidden;}
.score-card::before{content:'';position:absolute;width:300px;height:300px;top:-80px;right:-80px;background:radial-gradient(circle,rgba(13,148,136,0.25),transparent 70%);pointer-events:none;}
.score-card::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.sc-header{position:relative;z-index:1;margin-bottom:20px;}
.sc-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(13, 148, 136,0.2);border:1px solid rgba(13,148,136,0.3);border-radius:20px;padding:4px 12px;font-size:0.68rem;font-weight:700;color:var(--teal-pale);margin-bottom:10px;letter-spacing:0.8px;text-transform:uppercase;}
.sc-title{font-size:1.1rem;font-weight:800;color:var(--white);}
.sc-score-row{position:relative;z-index:1;display:flex;align-items:flex-end;gap:8px;margin-bottom:16px;}
.sc-big-score{font-size:4rem;font-weight:800;color:var(--white);letter-spacing:-3px;line-height:1;}
.sc-max{font-size:1.2rem;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.sc-comment{position:relative;z-index:1;font-size:0.8rem;color:rgba(255,255,255,0.55);line-height:1.6;}
.sc-breakdown{position:relative;z-index:1;display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.sc-row{display:flex;align-items:center;justify-content:space-between;font-size:0.78rem;}
.sc-row-label{color:rgba(255,255,255,0.6);}
.sc-row-val{font-weight:700;color:var(--white);}

/* BAR CHART */
.bar-chart{display:flex;flex-direction:column;gap:12px;}
.bc-row{display:flex;align-items:center;gap:12px;}
.bc-label{font-size:0.75rem;color:var(--ink-2);font-weight:600;width:120px;flex-shrink:0;text-align:right;}
.bc-bar-wrap{flex:1;height:22px;background:var(--stone-2);border-radius:6px;overflow:hidden;position:relative;}
.bc-bar-fill{height:100%;border-radius:6px;transition:width .8s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;}
.bc-bar-fill span{font-size:0.65rem;font-weight:700;color:rgba(255,255,255,0.9);}
.bc-num{font-size:0.72rem;color:var(--ink-4);width:36px;flex-shrink:0;}

/* IMAT SCORING */
.scoring-table{width:100%;border-collapse:collapse;}
.scoring-table th{font-size:0.68rem;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.8px;padding:6px 8px;border-bottom:2px solid var(--stone-3);text-align:left;}
.scoring-table td{font-size:0.82rem;padding:10px 8px;border-bottom:1px solid var(--stone-2);color:var(--ink-2);}
.scoring-table tr:last-child td{border-bottom:none;}
.scoring-table tr:hover td{background:var(--stone);}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:20px;}
.badge-green{background:var(--green-faint);color:var(--green);}
.badge-amber{background:var(--amber-pale);color:var(--amber);}
.badge-red{background:var(--red-faint);color:var(--red);}
.badge-gray{background:var(--stone-2);color:var(--ink-4);}

/* TIPS */
.tips-grid{display:flex;flex-direction:column;gap:10px;}
.tip{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--stone);border-radius:12px;border:1px solid transparent;transition:border-color .18s;}
.tip:hover{border-color:var(--teal);}
.tip-icon{width:32px;height:32px;border-radius:9px;background:var(--teal-pale);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0;}
.tip-text{font-size:0.82rem;color:var(--ink-2);line-height:1.55;}
.tip-text strong{color:var(--ink);font-weight:700;}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 40px;background:var(--white);border:1px solid var(--stone-3);border-radius:16px;}
.empty-icon{margin-bottom:20px;display:flex;justify-content:center;}
.empty-title{font-size:1.2rem;font-weight:700;margin-bottom:8px;}
.empty-desc{font-size:0.88rem;color:var(--ink-3);max-width:340px;margin:0 auto 24px;line-height:1.6;}

/* SECTION LABELS */
.section-label{display:flex;align-items:center;gap:10px;font-size:0.68rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal);margin:32px 0 14px;}
.section-label::before{content:'';display:block;width:14px;height:2px;background:var(--teal);border-radius:1px;}

@media(max-width:1000px){.kpi-row{grid-template-columns:repeat(3,1fr);}.analytics-grid{grid-template-columns:1fr;}.analytics-grid.three{grid-template-columns:1fr;}.panel.span2{grid-column:auto;}.subj-card-grid{grid-template-columns:1fr;}}
@media(max-width:700px){nav{padding:0 20px;}.page{padding:80px 20px 60px;}.kpi-row{grid-template-columns:repeat(2,1fr);}.bc-label{width:80px;font-size:0.68rem;}}
</style>
</head>
<body>

<nav>
  <a class="logo" href="dashboard.html">Imat<span>Path</span></a>
  <div style="display:flex;gap:8px;">
    <a class="btn-ghost" href="dashboard.html"><i class="fas fa-arrow-left" style="font-size:0.7rem;"></i> Dashboard</a>
    <a class="btn-teal" href="question-bank.html"><i class="fas fa-layer-group" style="font-size:0.7rem;"></i> Practice</a>
  </div>
</nav>

<div class="page" id="mainPage">

  <div class="page-header">
    <div class="page-label">Performance tracking</div>
    <h1 class="page-title">Your Analytics<span style="color:var(--teal);">.</span></h1>
    <p class="page-sub" id="pageSubText">Loading your progress data…</p>
  </div>

  <div id="analyticsContent"></div>

</div>

<script>
const SUBJECTS = [
  {id:'critical-thinking', name:'Critical Thinking', section:'Section 1', short:'Crit. Think.', icon:'fa-brain', color:'#0D9488', total:10},
  {id:'problem-solving',   name:'Problem Solving',  section:'Section 1', short:'Prob. Solving', icon:'fa-puzzle-piece', color:'#0891b2', total:15},
  {id:'data-analysis',     name:'Data Analysis',    section:'Section 1', short:'Data Analysis', icon:'fa-chart-bar', color:'#7c3aed', total:15},
  {id:'biology',           name:'Biology',           section:'Section 2', short:'Biology', icon:'fa-dna', color:'#16a34a', total:20},
  {id:'chemistry',         name:'Chemistry',         section:'Section 3', short:'Chemistry', icon:'fa-flask', color:'#b45309', total:20},
  {id:'physics',           name:'Physics',            section:'Section 4', short:'Physics', icon:'fa-atom', color:'#dc2626', total:15},
  {id:'maths',             name:'Mathematics',        section:'Section 4', short:'Maths', icon:'fa-square-root-variable', color:'#9333ea', total:22}
];

/* IMAT scoring: +1.5 correct, 0 blank, -0.4 wrong */
const IMAT_CORRECT = 1.5;
const IMAT_WRONG = -0.4;
const IMAT_QUESTIONS = 60;

function getQBData(){
  const saved = localStorage.getItem('imatpath_qb');
  if(!saved) return null;
  const s = JSON.parse(saved);
  const rev = s.revealed || {};
  const ans = s.answers || {};

  let totalAttempted = 0, totalCorrect = 0;
  const bySubject = {};

  SUBJECTS.forEach(sub => {
    let sAttempted = 0, sCorrect = 0, sWrong = 0;
    for(let i=0; i<sub.total; i++){
      const k = sub.id + '-' + i;
      if(rev[k]){
        sAttempted++;
        totalAttempted++;
        // We can't verify correctness here without question data
        // Use stored correct count proportionally
      }
    }
    bySubject[sub.id] = {attempted: sAttempted, correct: sCorrect, wrong: sWrong, total: sub.total};
  });

  const totalCorrectStored = parseInt(localStorage.getItem('imatpath_qb_correct') || '0');
  // Spread correct answers across subjects proportionally for display
  if(totalAttempted > 0){
    const ratio = totalCorrectStored / totalAttempted;
    SUBJECTS.forEach(sub => {
      const st = bySubject[sub.id];
      st.correct = Math.round(st.attempted * ratio);
      st.wrong = st.attempted - st.correct;
    });
  }

  return {attempted: totalAttempted, correct: totalCorrectStored, wrong: totalAttempted - totalCorrectStored, bySubject};
}

function accColor(pct){
  if(pct >= 70) return 'var(--green)';
  if(pct >= 50) return 'var(--amber)';
  return 'var(--red)';
}
function accBadgeClass(pct){
  if(pct >= 70) return 'badge-green';
  if(pct >= 50) return 'badge-amber';
  return 'badge-red';
}
function accLabel(pct){
  if(pct >= 80) return 'Excellent';
  if(pct >= 70) return 'Good';
  if(pct >= 55) return 'Average';
  if(pct >= 40) return 'Needs work';
  return 'Critical';
}

function predictIMAT(correct, wrong, blank){
  const raw = correct * IMAT_CORRECT + wrong * IMAT_WRONG;
  return Math.max(0, Math.round(raw * 10) / 10);
}

function render(){
  const data = getQBData();
  const content = document.getElementById('analyticsContent');

  if(!data || data.attempted === 0){
    document.getElementById('pageSubText').textContent = 'Complete some questions to unlock your analytics.';
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="72" height="72" rx="18" fill="#F0FDFB"/>
            <rect x="1" y="1" width="70" height="70" rx="17" stroke="#0D9488" stroke-opacity="0.15" stroke-width="1.5"/>
            <!-- Bar chart bars -->
            <rect x="14" y="42" width="10" height="14" rx="3" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.2"/>
            <rect x="28" y="32" width="10" height="24" rx="3" fill="#0D9488" opacity="0.6"/>
            <rect x="42" y="24" width="10" height="32" rx="3" fill="#0D9488"/>
            <rect x="56" y="36" width="10" height="20" rx="3" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.2" stroke-dasharray="2 2"/>
            <!-- Trend line -->
            <polyline points="19,44 33,34 47,26 61,38" stroke="#0D9488" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 2" opacity="0.5"/>
            <!-- Dots on line -->
            <circle cx="19" cy="44" r="2.5" fill="#0D9488" opacity="0.7"/>
            <circle cx="47" cy="26" r="2.5" fill="#0D9488"/>
            <!-- Question mark on last bar (no data) -->
            <text x="61" y="34" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="8" font-weight="700" fill="#8A8780">?</text>
          </svg>
        </div>
        <div class="empty-title">No data yet</div>
        <div class="empty-desc">Start practicing in the Question Bank to see detailed analytics, score predictions, and personalized recommendations here.</div>
        <a class="btn-teal" href="question-bank.html" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;">
          <i class="fas fa-layer-group"></i> Go to Question Bank
        </a>
      </div>
    `;
    return;
  }

  const totalQ = SUBJECTS.reduce((a,s)=>a+s.total,0);
  const acc = data.attempted > 0 ? Math.round(data.correct / data.attempted * 100) : 0;
  const blank = totalQ - data.attempted;
  const imatScore = predictIMAT(data.correct, data.wrong, blank);
  const maxImat = IMAT_QUESTIONS * IMAT_CORRECT;
  const coverage = Math.round((data.attempted / totalQ) * 100);
  const startedSubjects = SUBJECTS.filter(s => data.bySubject[s.id] && data.bySubject[s.id].attempted > 0).length;

  document.getElementById('pageSubText').textContent =
    `You've attempted ${data.attempted} of ${totalQ} questions across ${startedSubjects} subject${startedSubjects!==1?'s':''}.`;

  /* ── KPI ROW ── */
  let html = `
  <div class="kpi-row">
    <div class="kpi teal">
      <div class="kpi-val">${data.attempted}</div>
      <div class="kpi-lbl">Questions Attempted</div>
      <div class="kpi-sub">${coverage}% of question bank</div>
    </div>
    <div class="kpi ${acc>=70?'green':acc>=50?'amber':'red'}">
      <div class="kpi-val">${acc}%</div>
      <div class="kpi-lbl">Overall Accuracy</div>
      <div class="kpi-sub">${accLabel(acc)}</div>
    </div>
    <div class="kpi green">
      <div class="kpi-val">${data.correct}</div>
      <div class="kpi-lbl">Correct Answers</div>
      <div class="kpi-sub">+${(data.correct * IMAT_CORRECT).toFixed(1)} IMAT pts</div>
    </div>
    <div class="kpi red">
      <div class="kpi-val">${data.wrong}</div>
      <div class="kpi-lbl">Wrong Answers</div>
      <div class="kpi-sub">${(data.wrong * IMAT_WRONG).toFixed(1)} IMAT pts</div>
    </div>
    <div class="kpi blue">
      <div class="kpi-val">${startedSubjects}<span style="font-size:1.2rem;color:var(--ink-3);">/${SUBJECTS.length}</span></div>
      <div class="kpi-lbl">Subjects Practiced</div>
      <div class="kpi-sub">${SUBJECTS.length - startedSubjects} subjects remaining</div>
    </div>
  </div>`;

  /* ── SECTION: SCORE PREDICTOR + CHART ── */
  html += `<div class="section-label">Score prediction & breakdown</div>`;
  html += `<div class="analytics-grid">`;

  /* Score predictor card */
  const scoreComment = imatScore >= 45 ? 'You\'re tracking toward a competitive score. Keep practicing consistently.'
    : imatScore >= 30 ? 'Good progress — focus on accuracy to push your predicted score higher.'
    : 'Early stage — your score will increase significantly as you cover more of the question bank.';

  html += `
  <div class="score-card">
    <div class="sc-header">
      <div class="sc-badge"><i class="fas fa-calculator" style="font-size:0.6rem;"></i> IMAT Score Predictor</div>
      <div class="sc-title">Estimated Score</div>
    </div>
    <div class="sc-score-row">
      <div class="sc-big-score">${imatScore}</div>
      <div class="sc-max">/ ${maxImat}</div>
    </div>
    <div class="sc-comment">${scoreComment}</div>
    <div class="sc-breakdown">
      <div class="sc-row"><span class="sc-row-label">Correct (×1.5)</span><span class="sc-row-val" style="color:#4ade80;">+${(data.correct * IMAT_CORRECT).toFixed(1)}</span></div>
      <div class="sc-row"><span class="sc-row-label">Wrong (×−0.4)</span><span class="sc-row-val" style="color:#f87171;">${(data.wrong * IMAT_WRONG).toFixed(1)}</span></div>
      <div class="sc-row"><span class="sc-row-label">Blank (×0)</span><span class="sc-row-val" style="color:rgba(255,255,255,0.4);">0.0</span></div>
      <div style="height:1px;background:rgba(255,255,255,0.08);margin:4px 0;"></div>
      <div class="sc-row"><span class="sc-row-label" style="color:rgba(255,255,255,0.8);font-weight:700;">Raw score</span><span class="sc-row-val" style="font-size:1rem;">${imatScore}</span></div>
    </div>
  </div>`;

  /* Subject accuracy bar chart */
  html += `
  <div class="panel">
    <div class="ph"><div class="pt"><i class="fas fa-chart-bar"></i> Accuracy by Subject</div></div>
    <div class="bar-chart">`;
  SUBJECTS.forEach(sub => {
    const st = data.bySubject[sub.id] || {attempted:0, correct:0};
    const subAcc = st.attempted > 0 ? Math.round(st.correct / st.attempted * 100) : 0;
    const color = st.attempted > 0 ? accColor(subAcc) : 'var(--stone-3)';
    html += `
      <div class="bc-row">
        <div class="bc-label" style="font-size:0.7rem;">${sub.short}</div>
        <div class="bc-bar-wrap">
          <div class="bc-bar-fill" data-w="${st.attempted>0?subAcc:0}" style="width:0%;background:${color};">
            <span>${st.attempted>0?subAcc+'%':''}</span>
          </div>
        </div>
        <div class="bc-num">${st.attempted>0?subAcc+'%':'—'}</div>
      </div>`;
  });
  html += `</div></div>`;
  html += `</div>`; /* end analytics-grid */

  /* ── SECTION: SUBJECT CARDS ── */
  html += `<div class="section-label">Subject-by-subject breakdown</div>`;
  html += `<div class="panel">`;
  html += `<div class="subj-card-grid">`;
  SUBJECTS.forEach(sub => {
    const st = data.bySubject[sub.id] || {attempted:0, correct:0, wrong:0, total:sub.total};
    const pct = Math.round((st.attempted / sub.total) * 100);
    const subAcc = st.attempted > 0 ? Math.round(st.correct / st.attempted * 100) : null;
    const notStarted = st.attempted === 0;
    const badgeClass = subAcc !== null ? accBadgeClass(subAcc) : 'badge-gray';
    const imatPts = (st.correct * IMAT_CORRECT + st.wrong * IMAT_WRONG).toFixed(1);
    html += `
    <div class="sc">
      <div class="sc-top">
        <div class="sc-icon" style="background:${sub.color}18;color:${sub.color};border:1px solid ${sub.color}28;">
          <i class="fas ${sub.icon}"></i>
        </div>
        <div>
          <div class="sc-name">${sub.name}</div>
          <div class="sc-sec">${sub.section}</div>
        </div>
      </div>
      <div class="sc-stats">
        <div>
          <div class="sc-stat-val" style="color:${sub.color};">${st.attempted}/${sub.total}</div>
          <div class="sc-stat-lbl">Attempted</div>
        </div>
        <div>
          <div class="sc-stat-val" style="color:${subAcc!==null?accColor(subAcc):'var(--ink-4)'};">${subAcc!==null?subAcc+'%':'—'}</div>
          <div class="sc-stat-lbl">Accuracy</div>
        </div>
        <div>
          <div class="sc-stat-val" style="color:${parseFloat(imatPts)>=0?'var(--green)':'var(--red)'};">${parseFloat(imatPts)>=0?'+':''}${imatPts}</div>
          <div class="sc-stat-lbl">IMAT pts</div>
        </div>
      </div>
      <div class="mini-bar"><div class="mini-bar-fill" data-pct="${pct}" style="width:0%;background:${sub.color};"></div></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
        <span class="sc-acc-badge ${badgeClass}">
          ${notStarted ? '<i class="fas fa-minus" style="font-size:0.55rem;"></i> Not started' : `<i class="fas fa-${subAcc>=70?'check':subAcc>=50?'arrow-up':'arrow-down'}" style="font-size:0.55rem;"></i> ${accLabel(subAcc)}`}
        </span>
        <span style="font-size:0.68rem;color:var(--ink-4);">${pct}% done</span>
      </div>
    </div>`;
  });
  html += `</div></div>`;

  /* ── SECTION: SCORING TABLE + TIPS ── */
  html += `<div class="section-label">IMAT scoring reference & tips</div>`;
  html += `<div class="analytics-grid">`;

  /* Scoring table */
  html += `
  <div class="panel">
    <div class="ph"><div class="pt"><i class="fas fa-calculator"></i> IMAT Scoring System</div></div>
    <table class="scoring-table">
      <thead>
        <tr><th>Answer Type</th><th>Points</th><th>Your Count</th><th>Your Points</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="badge badge-green"><i class="fas fa-check"></i> Correct</span></td>
          <td style="font-weight:700;color:var(--green);">+1.5</td>
          <td>${data.correct}</td>
          <td style="font-weight:700;color:var(--green);">+${(data.correct * 1.5).toFixed(1)}</td>
        </tr>
        <tr>
          <td><span class="badge badge-red"><i class="fas fa-xmark"></i> Wrong</span></td>
          <td style="font-weight:700;color:var(--red);">−0.4</td>
          <td>${data.wrong}</td>
          <td style="font-weight:700;color:var(--red);">${(data.wrong * -0.4).toFixed(1)}</td>
        </tr>
        <tr>
          <td><span class="badge badge-gray"><i class="fas fa-minus"></i> Blank</span></td>
          <td style="color:var(--ink-4);">0.0</td>
          <td>${totalQ - data.attempted}</td>
          <td style="color:var(--ink-4);">0.0</td>
        </tr>
      </tbody>
    </table>
    <div style="margin-top:18px;padding:14px;background:var(--teal-faint);border-radius:10px;border:1px solid rgba(13,148,136,0.15);">
      <div style="font-size:0.78rem;color:var(--teal);font-weight:700;margin-bottom:4px;">💡 Strategy tip</div>
      <div style="font-size:0.78rem;color:var(--ink-2);line-height:1.55;">Only guess if you can eliminate at least <strong>2 options</strong>. If you're completely unsure, leaving blank is safer than guessing — you'll avoid the −0.4 penalty.</div>
    </div>
  </div>`;

  /* Tips */
  const tips = [];
  if(acc < 50) tips.push({icon:'fa-book-open', text:'<strong>Focus on understanding, not volume.</strong> Read every worked solution in full before moving to the next question.'});
  else if(acc < 70) tips.push({icon:'fa-repeat', text:'<strong>Review your wrong answers.</strong> Go back through the questions you got wrong and understand why before trying new ones.'});
  else tips.push({icon:'fa-stopwatch', text:'<strong>Practice under timed conditions.</strong> Your accuracy is good — the next challenge is maintaining it under 100-minute pressure.'});

  if(data.attempted < totalQ * 0.3)
    tips.push({icon:'fa-map-signs', text:'<strong>Cover all subjects.</strong> IMAT tests a broad range — don\'t let any section be an unknown area on exam day.'});

  tips.push({icon:'fa-calendar', text:'<strong>Daily practice beats cramming.</strong> 20 questions per day for 3 months is far more effective than marathon sessions.'});
  tips.push({icon:'fa-flask', text:'<strong>Science sections carry the most weight.</strong> Biology, Chemistry, and Physics together account for 60 of the 90 IMAT questions.'});

  if(SUBJECTS.some(s => !data.bySubject[s.id] || data.bySubject[s.id].attempted === 0))
    tips.push({icon:'fa-exclamation-circle', text:'<strong>You have untouched subjects.</strong> Starting a new subject — even with just 5 questions — gives you better insight into where you stand.'});

  html += `
  <div class="panel">
    <div class="ph"><div class="pt"><i class="fas fa-lightbulb"></i> Personalized Tips</div></div>
    <div class="tips-grid">
      ${tips.map(t=>`<div class="tip"><div class="tip-icon"><i class="fas ${t.icon}"></i></div><div class="tip-text">${t.text}</div></div>`).join('')}
    </div>
    <div style="margin-top:20px;padding:14px;background:var(--stone);border-radius:10px;border:1px solid var(--stone-3);text-align:center;">
      <div style="font-size:0.8rem;font-weight:700;color:var(--ink);margin-bottom:6px;">Ready for the next level?</div>
      <a href="mock-exam.html" class="btn-teal" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;">
        <i class="fas fa-stopwatch" style="font-size:0.7rem;"></i> Take a full mock exam
      </a>
    </div>
  </div>`;

  html += `</div>`; /* end analytics-grid */
  content.innerHTML = html;

  /* Animate bars */
  setTimeout(() => {
    document.querySelectorAll('.bc-bar-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
    document.querySelectorAll('.mini-bar-fill[data-pct]').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 200);
}

render();
</script>
</body>
</html>
