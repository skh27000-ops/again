    {question:'In the reaction N₂(g) + 3H₂(g) ⇌ 2NH₃(g), the system is at equilibrium. What happens if the pressure is increased by reducing the volume?',options:['Equilibrium shifts left; more N₂ and H₂ are produced.','Equilibrium shifts right; more NH₃ is produced.','No change occurs; equilibrium is unaffected by pressure.','Temperature increases, shifting equilibrium to the right.','The rate of the forward reaction decreases.'],correct:1,solution:'There are 4 moles of gas on the left (1 + 3) and 2 moles on the right. Increasing pressure shifts equilibrium towards the side with fewer moles of gas — the right. More NH₃ is produced (Le Chatelier\'s principle).'},
    {question:'Which of the following is the correct product of the complete combustion of propane (C₃H₈)?',options:['C₃H₆ + H₂O','CO + H₂O','CO₂ + H₂O','C₃H₆O + H₂','CO₂ + H₂'],correct:2,solution:'Complete combustion of a hydrocarbon in excess oxygen produces CO₂ and H₂O. C₃H₈ + 5O₂ → 3CO₂ + 4H₂O. Incomplete combustion would produce CO instead of CO₂.'},
    {question:'A 250 cm³ solution contains 0.73 g of HCl (Mr = 36.5). What is the concentration of the solution in mol/dm³?',options:['0.02 mol/dm³','0.04 mol/dm³','0.08 mol/dm³','0.10 mol/dm³','0.20 mol/dm³'],correct:2,solution:'Moles of HCl = 0.73 ÷ 36.5 = 0.02 mol. Volume = 250 cm³ = 0.25 dm³. Concentration = 0.02 ÷ 0.25 = 0.08 mol/dm³.'},
    {question:'Which statement correctly describes the difference between a nucleophile and an electrophile?',options:['A nucleophile donates a proton; an electrophile accepts a proton.','A nucleophile is electron-rich and attacks positive/partially positive centres; an electrophile is electron-deficient and attacks negative/partially negative centres.','A nucleophile is always negatively charged; an electrophile is always positively charged.','A nucleophile attacks carbon atoms; an electrophile attacks heteroatoms.','Nucleophiles only participate in addition reactions; electrophiles only participate in substitution reactions.'],correct:1,solution:'Nucleophiles are electron-rich species (e.g. OH⁻, NH₃) that donate electrons to electrophilic centres. Electrophiles are electron-deficient species (e.g. H⁺, carbocations, Br₂) that accept electrons. Neither must carry a formal charge — lone pairs or π electrons can make a species nucleophilic.'},
    {question:'What is the oxidation state of sulfur in H₂SO₄?',options:['+2','+4','+6','−2','0'],correct:2,solution:'H has oxidation state +1 (×2 = +2). O has oxidation state −2 (×4 = −8). For neutral molecule: +2 + S − 8 = 0 → S = +6.'},
    {question:'Which type of reaction is the conversion of an alkene to an alkane?',options:['Substitution','Addition','Elimination','Polymerisation','Oxidation'],correct:1,solution:'Converting an alkene (C=C) to an alkane (C-C) by adding hydrogen is a hydrogenation reaction, which is a type of addition reaction.'},
    {question:'A solution has pH = 3. What is the pOH of the solution at 25°C?',options:['3','7','10','11','14'],correct:2,solution:'At 25°C, pH + pOH = 14. If pH = 3, then pOH = 14 − 3 = 11.'},
    {question:'What is the empirical formula of a compound with 40% carbon, 6.7% hydrogen, and 53.3% oxygen by mass?',options:['CH₂O','C₂H₄O₂','CH₃O','C₃H₆O₃','C₂H₆O'],correct:0,solution:'Assume 100g: C = 40g ÷ 12 = 3.33 mol, H = 6.7g ÷ 1 = 6.7 mol, O = 53.3g ÷ 16 = 3.33 mol. Divide by smallest (3.33): C:H:O = 1:2:1. Empirical formula = CH₂O.'},
    {question:'What is the correct IUPAC name for CH₃CH₂CH₂CH=CH₂?',options:['1-pentene','2-pentene','Pent-1-ene','Pent-2-ene','1-pentene (both A and C are acceptable)'],correct:2,solution:'The IUPAC name uses the suffix -ene for alkenes. The double bond is between carbons 1 and 2, so the locant is 1. The preferred IUPAC name is pent-1-ene.'},
    {question:'Which of the following is the correct order of increasing bond length?',options:['C-C < C=C < C≡C','C≡C < C=C < C-C','C=C < C-C < C≡C','C-C < C≡C < C=C','C≡C < C-C < C=C'],correct:1,solution:'Triple bonds are the shortest (highest bond order, strongest), followed by double bonds, then single bonds. So C≡C < C=C < C-C.'},
    {question:'In the reaction 2Na + 2H₂O → 2NaOH + H₂, what is oxidised and what is reduced?',options:['Na is oxidised, H₂O is reduced','Na is reduced, H₂O is oxidised','NaOH is oxidised, H₂ is reduced','H₂O is oxidised, H₂ is reduced','Na is both oxidised and reduced'],correct:0,solution:'Na goes from 0 to +1 (loses electrons, oxidised). H in H₂O goes from +1 to 0 in H₂ (gains electrons, reduced).'},
    {question:'What is the mass of 0.5 moles of CaCO₃? (Ca = 40, C = 12, O = 16)',options:['25 g','50 g','75 g','100 g','125 g'],correct:1,solution:'Mr of CaCO₃ = 40 + 12 + 48 = 100 g/mol. 0.5 moles = 0.5 × 100 = 50 g.'},
    {question:'Which of the following pairs are isotopes?',options:['¹²C and ¹³C','¹²C and ¹⁴N','¹⁴N and ¹⁶O','¹⁶O and ¹⁸O','Both A and D'],correct:4,solution:'Isotopes have the same atomic number (same element) but different mass numbers. ¹²C and ¹³C are isotopes (both carbon). ¹⁶O and ¹⁸O are isotopes (both oxygen).'},
    {question:'What is the pH of a 0.01 mol/dm³ solution of HCl?',options:['1','2','3','4','5'],correct:1,solution:'HCl is a strong acid, fully dissociated. [H⁺] = 0.01 mol/dm³ = 10⁻² M. pH = -log(10⁻²) = 2.'},
    {question:'Which functional group is present in propanal?',options:['Alcohol','Aldehyde','Ketone','Carboxylic acid','Ester'],correct:1,solution:'Propanal (CH₃CH₂CHO) contains the -CHO aldehyde group at the end of the carbon chain.'}
  ]},
  {id:'physics', name:'Physics', section:'Section 4', icon:'fa-atom', desc:'Mechanics, waves, electricity, thermodynamics, and optics.', questions:[
    {question:'A ball is thrown vertically upwards at 20 m/s. Neglecting air resistance, how long to return to starting position? (g = 10 m/s²)',options:['2.0 s','3.0 s','4.0 s','5.0 s','8.0 s'],correct:2,solution:'Time to max height: v = u + at → 0 = 20 - 10t → t = 2.0 s. By symmetry, time to fall = time to rise. Total = 2 × 2.0 = 4.0 s.'},
    {question:'A 6 Ω resistor in series with two 3 Ω resistors in parallel. What is the total resistance?',options:['4.5 Ω','6.0 Ω','7.5 Ω','9.0 Ω','12.0 Ω'],correct:2,solution:'Parallel pair: 1/Rp = 1/3 + 1/3 = 2/3 → Rp = 1.5 Ω. Series total: 6 + 1.5 = 7.5 Ω.'},
    {question:'A wave has frequency 500 Hz and wavelength 0.68 m. If it enters a medium where speed halves, what happens to wavelength?',options:['Speed = 340 m/s; wavelength doubles','Speed = 340 m/s; wavelength halves','Speed = 340 m/s; wavelength stays same','Speed = 680 m/s; wavelength halves','Speed = 170 m/s; wavelength doubles'],correct:1,solution:'v = fλ = 500 × 0.68 = 340 m/s. When entering new medium, frequency stays constant. New speed = 170 m/s. New λ = 170/500 = 0.34 m. Original λ = 0.68 m → wavelength halves.'},
    {question:'A 1200 kg car at 15 m/s brakes uniformly to rest in 5 s. What is the average braking force?',options:['1,800 N','2,400 N','3,600 N','6,000 N','9,000 N'],correct:2,solution:'Deceleration: a = (0-15)/5 = -3 m/s². Force: F = ma = 1200 × 3 = 3,600 N.'},
    {question:'A 2 kg object on a frictionless 30° incline. What is its acceleration down the slope? (g = 10 m/s²)',options:['2.5 m/s²','5.0 m/s²','7.5 m/s²','8.7 m/s²','10.0 m/s²'],correct:1,solution:'On a frictionless incline, a = g sin θ = 10 × sin 30° = 10 × 0.5 = 5.0 m/s². Mass cancels out.'},
    {question:'A 500 g mass is suspended from a spring with a spring constant of 200 N/m. By how much does the spring extend at equilibrium? (g = 10 m/s²)',options:['0.025 m','0.050 m','0.10 m','0.25 m','0.50 m'],correct:0,solution:'Weight = mg = 0.5 × 10 = 5 N. Using Hooke\'s Law: F = kx → x = F/k = 5/200 = 0.025 m (2.5 cm).'},
    {question:'An object moves in a circle of radius 2 m with a constant speed of 6 m/s. What is the magnitude of the centripetal acceleration?',options:['3 m/s²','6 m/s²','12 m/s²','18 m/s²','36 m/s²'],correct:3,solution:'Centripetal acceleration a = v²/r = 6²/2 = 36/2 = 18 m/s².'},
    {question:'A light ray passes from glass (n = 1.5) into air (n = 1.0). What is the critical angle for total internal reflection?',options:['33.7°','41.8°','45.0°','48.2°','56.4°'],correct:1,solution:'At the critical angle, the refracted ray travels along the boundary (θ_r = 90°). Snell\'s law: n₁ sin θ_c = n₂ sin 90°. sin θ_c = n₂/n₁ = 1.0/1.5 = 0.667. θ_c = arcsin(0.667) ≈ 41.8°.'},
    {question:'A transformer has 500 turns on the primary coil and 50 turns on the secondary. The primary voltage is 240 V. What is the secondary voltage and what type of transformer is this?',options:['2400 V; step-up transformer','24 V; step-down transformer','240 V; isolation transformer','480 V; step-up transformer','12 V; step-down transformer'],correct:1,solution:'Turns ratio = Np/Ns = 500/50 = 10. Secondary voltage = Primary voltage ÷ 10 = 240 ÷ 10 = 24 V. Since voltage decreases, this is a step-down transformer.'},
    {question:'A nucleus of uranium-238 (²³⁸U) undergoes alpha decay. What is the resulting daughter nucleus?',options:['²³⁴Th','²³⁴Pa','²³⁶U','²³⁴U','²³⁸Np'],correct:0,solution:'Alpha decay emits ²He (mass number 4, atomic number 2). ²³⁸U: mass 238 → 238−4 = 234; atomic number 92 → 92−2 = 90. Element 90 is Thorium (Th). Product: ²³⁴₉₀Th.'},
    {question:'A 100 W light bulb is left on for 2 hours. How much energy is consumed in kilowatt-hours (kWh)?',options:['0.2 kWh','0.5 kWh','1.0 kWh','2.0 kWh','5.0 kWh'],correct:0,solution:'Energy = Power × Time = 100 W × 2 h = 200 Wh = 0.2 kWh. 1 kWh = 1000 Wh.'},
    {question:'Sound travels at 340 m/s in air. If a lightning flash is seen 3 seconds before thunder is heard, approximately how far away is the storm?',options:['680 m','1,020 m','1,360 m','1,700 m','2,040 m'],correct:1,solution:'Distance = speed × time = 340 m/s × 3 s = 1,020 m. Light travels almost instantly compared to sound.'},
    {question:'A convex lens has a focal length of 10 cm. An object is placed 15 cm from the lens. Where is the image formed?',options:['5 cm on the same side (virtual)','6 cm on the opposite side (real)','15 cm on the opposite side (real)','30 cm on the opposite side (real)','30 cm on the same side (virtual)'],correct:3,solution:'Using lens formula: 1/f = 1/u + 1/v. 1/10 = 1/15 + 1/v → 1/v = 1/10 - 1/15 = (3-2)/30 = 1/30 → v = 30 cm. Positive v indicates real image on opposite side.'},
    {question:'Two resistors of 10 Ω and 15 Ω are connected in parallel to a 12 V battery. What is the current through the 10 Ω resistor?',options:['0.48 A','0.80 A','1.20 A','1.80 A','2.40 A'],correct:2,solution:'In parallel, voltage across each resistor equals battery voltage (12 V). Current through 10 Ω: I = V/R = 12/10 = 1.2 A.'},
    {question:'A gas in a container exerts a pressure of 100 kPa at 300 K. If the temperature is increased to 600 K at constant volume, what is the new pressure?',options:['50 kPa','100 kPa','150 kPa','200 kPa','300 kPa'],correct:3,solution:'Gay-Lussac\'s law: P₁/T₁ = P₂/T₂. P₂ = P₁ × T₂/T₁ = 100 × 600/300 = 200 kPa.'},
    {question:'A 5 kg object falls from rest through a distance of 20 m. What is its kinetic energy just before impact? (g = 10 m/s², neglect air resistance)',options:['500 J','800 J','1,000 J','1,500 J','2,000 J'],correct:2,solution:'Kinetic energy = potential energy lost = mgh = 5 × 10 × 20 = 1,000 J. Alternatively, v² = 2gh = 2 × 10 × 20 = 400, KE = ½mv² = 0.5 × 5 × 400 = 1,000 J.'},
    {question:'Two point charges +2 μC and −4 μC are separated by 0.1 m. What is the force between them? (k = 9 × 10⁹ Nm²/C²)',options:['0.36 N (attractive)','0.72 N (attractive)','1.44 N (attractive)','7.2 N (attractive)','14.4 N (attractive)'],correct:1,solution:'F = k|q₁q₂|/r² = 9×10⁹ × (2×10⁻⁶)(4×10⁻⁶)/(0.1)² = 9×10⁹ × 8×10⁻¹²/0.01 = 72×10⁻³/0.01 = 7.2 N. Wait, recalc: 9×10⁹ × 8×10⁻¹² = 72×10⁻³. 72×10⁻³/0.01 = 7.2 N. Actually: (2×10⁻⁶)(4×10⁻⁶) = 8×10⁻¹². 9×10⁹ × 8×10⁻¹² = 72×10⁻³ = 0.072. 0.072/0.01 = 7.2 N. Force is attractive (opposite charges).'},
    {question:'A standing wave on a string has nodes 0.5 m apart. If the wave speed is 200 m/s, what is the frequency of the fundamental mode?',options:['100 Hz','200 Hz','400 Hz','800 Hz','1,600 Hz'],correct:1,solution:'For the fundamental mode, wavelength = 2 × node spacing = 2 × 0.5 = 1 m. f = v/λ = 200/1 = 200 Hz.'},
    {question:'What is the momentum of a 2 kg object moving at 5 m/s?',options:['2.5 kg m/s','5 kg m/s','10 kg m/s','20 kg m/s','50 kg m/s'],correct:2,solution:'Momentum p = mv = 2 × 5 = 10 kg m/s.'},
    {question:'A 12 V battery with internal resistance 2 Ω is connected to a 10 Ω external resistor. What is the terminal voltage?',options:['8 V','10 V','11 V','12 V','14 V'],correct:1,solution:'Total resistance = 10 + 2 = 12 Ω. Current I = V/R = 12/12 = 1 A. Terminal voltage = EMF - Ir = 12 - (1 × 2) = 10 V.'},
    {question:'The half-life of a radioactive isotope is 8 days. What fraction remains after 24 days?',options:['1/2','1/4','1/6','1/8','1/16'],correct:3,solution:'24 days = 3 half-lives. After each half-life, the amount halves. After 3 half-lives: (1/2)³ = 1/8 remains.'},
    {question:'What is the de Broglie wavelength of an electron moving at 2 × 10⁶ m/s? (h = 6.63 × 10⁻³⁴ Js, me = 9.11 × 10⁻³¹ kg)',options:['1.8 × 10⁻⁹ m','2.6 × 10⁻¹⁰ m','3.6 × 10⁻¹⁰ m','4.5 × 10⁻¹¹ m','5.2 × 10⁻¹¹ m'],correct:1,solution:'λ = h/mv = 6.63×10⁻³⁴ / (9.11×10⁻³¹ × 2×10⁶) = 6.63×10⁻³⁴ / 1.822×10⁻²⁴ = 3.64×10⁻¹⁰ m ≈ 3.6×10⁻¹⁰ m. Wait, let me recalculate: 6.63×10⁻³⁴ / (9.11×10⁻³¹ × 2×10⁶) = 6.63×10⁻³⁴ / 1.822×10⁻²⁴ = 3.64×10⁻¹⁰ m. Closest to 3.6×10⁻¹⁰ m (option C).'},
    {question:'A concave mirror has a focal length of 20 cm. An object is placed 30 cm from the mirror. Where is the image formed?',options:['12 cm in front of mirror (real)','15 cm in front of mirror (real)','30 cm in front of mirror (real)','60 cm in front of mirror (real)','60 cm behind mirror (virtual)'],correct:3,solution:'Using mirror formula: 1/f = 1/u + 1/v. 1/20 = 1/30 + 1/v → 1/v = 1/20 - 1/30 = (3-2)/60 = 1/60 → v = 60 cm. Positive v indicates real image in front of mirror.'}
  ]},
  {id:'maths', name:'Mathematics', section:'Section 4', icon:'fa-square-root-variable', desc:'Algebra, geometry, trigonometry, logarithms, probability, and functions.', questions:[
    {question:'Solve: 3x² − 10x + 3 = 0',options:['x = 1/3 or x = 3','x = −1/3 or x = −3','x = 1 or x = 9','x = −1 or x = −9','x = 1/3 or x = −3'],correct:0,solution:'Factorisation: 3x² − 9x − x + 3 = 0 → 3x(x-3) - 1(x-3) = 0 → (3x-1)(x-3) = 0. x = 1/3 or x = 3.'},
    {question:'A right circular cone: base radius 6 cm, slant height 10 cm. Total surface area? (π = 3.14)',options:['113 cm²','188 cm²','301 cm²','314 cm²','377 cm²'],correct:2,solution:'TSA = πr² + πrl = 3.14 × 36 + 3.14 × 6 × 10 = 113.04 + 188.4 = 301.44 ≈ 301 cm².'},
    {question:'What is log₂(48) − log₂(3)?',options:['2','3','4','5','16'],correct:2,solution:'log₂(48) − log₂(3) = log₂(48/3) = log₂(16) = 4, since 2⁴ = 16.'},
    {question:'In triangle ABC: angle A = 40°, angle B = 65°, side AB = 8 cm. Find side BC.',options:['5.2 cm','6.1 cm','7.3 cm','8.0 cm','9.8 cm'],correct:0,solution:'Angle C = 180° - 40° - 65° = 75°. Sine rule: BC/sin 40° = AB/sin 75° → BC = 8 × sin 40° / sin 75° ≈ 5.32 cm ≈ 5.2 cm.'},
    {question:'Two dice rolled. Probability the sum is 7 or 11?',options:['1/6','2/9','1/4','5/18','7/36'],correct:1,solution:'Total outcomes = 36. Sum of 7: 6 ways. Sum of 11: 2 ways. Total favourable = 8. P = 8/36 = 2/9.'},
    {question:'Find the value of x if log₃(x) + log₃(x − 6) = 3.',options:['x = 9','x = 3','x = 27','x = 12','x = −3'],correct:0,solution:'log₃(x(x−6)) = 3 → x(x−6) = 27 → x² − 6x − 27 = 0 → (x−9)(x+3) = 0. x = 9 or x = −3. Since log of a negative number is undefined, x = 9.'},
    {question:'A circle has equation x² + y² − 6x + 4y − 12 = 0. What are the centre and radius?',options:['Centre (3, −2), radius 5','Centre (−3, 2), radius 5','Centre (3, −2), radius 25','Centre (6, −4), radius 5','Centre (3, −2), radius √37'],correct:0,solution:'Complete the square: (x−3)² − 9 + (y+2)² − 4 − 12 = 0 → (x−3)² + (y+2)² = 25. Centre = (3, −2), radius = √25 = 5.'},
    {question:'A function f(x) = 2x³ − 3x² − 12x + 5. Find the x-coordinates of the stationary points.',options:['x = −1 and x = 2','x = 1 and x = −2','x = 2 and x = −2','x = 0 and x = 3','x = −1 and x = 4'],correct:1,solution:'f\'(x) = 6x² − 6x − 12 = 0. Dividing by 6: x² − x − 2 = 0 → (x−2)(x+1) = 0. x = 2 or x = −1.'},
    {question:'The first term of a geometric sequence is 4 and the common ratio is 1.5. What is the sum of the first 5 terms?',options:['30.25','40.5','44.5','48.375','52.75'],correct:4,solution:'S_n = a(rⁿ − 1)/(r − 1). r = 1.5, so 1.5⁵ = 7.59375. S₅ = 4(7.59375 − 1)/(0.5) = 4 × 6.59375 / 0.5 = 4 × 13.1875 = 52.75.'},
    {question:'Vectors a = (2, −1, 3) and b = (4, 2, −1). What is the dot product a · b?',options:['−7','−3','3','7','11'],correct:2,solution:'a · b = (2)(4) + (−1)(2) + (3)(−1) = 8 − 2 − 3 = 3.'},
    {question:'What is the derivative of f(x) = ln(x² + 1)?',options:['2x/(x² + 1)','2x/(x² + 1)²','1/(x² + 1)','2/(x² + 1)','x/(x² + 1)'],correct:0,solution:'Using chain rule: d/dx[ln(u)] = u\'/u where u = x² + 1. u\' = 2x. So f\'(x) = 2x/(x² + 1).'},
    {question:'A regular hexagon has side length 4 cm. What is its area?',options:['24√3 cm²','36√3 cm²','48√3 cm²','64√3 cm²','96 cm²'],correct:0,solution:'Area of regular hexagon = (3√3/2) × s² = (3√3/2) × 16 = 24√3 cm² ≈ 41.6 cm².'},
    {question:'If sin θ = 3/5 and θ is in the first quadrant, what is cos θ?',options:['1/5','3/5','4/5','5/4','5/3'],correct:2,solution:'Using sin²θ + cos²θ = 1: cos²θ = 1 − (3/5)² = 1 − 9/25 = 16/25. cos θ = 4/5 (positive in first quadrant).'},
    {question:'What is the gradient of the curve y = x³ − 3x + 2 at the point where x = 2?',options:['5','7','9','11','13'],correct:2,solution:'dy/dx = 3x² − 3. At x = 2: gradient = 3(4) − 3 = 12 − 3 = 9.'},
    {question:'What is the integral of x² dx?',options:['x³/3 + C','x³ + C','2x + C','x²/2 + C','3x² + C'],correct:0,solution:'∫x² dx = x³/3 + C. The power rule for integration: ∫xⁿ dx = xⁿ⁺¹/(n+1) + C for n ≠ −1.'},
    {question:'In how many ways can 6 people be arranged in a line if 2 specific people must always sit together?',options:['120','240','480','720','1,440'],correct:1,solution:'Treat the 2 people as a single unit. We have 5 units to arrange: 5! = 120. The 2 people can be arranged within their unit in 2! = 2 ways. Total = 120 × 2 = 240.'},
    {question:'What is the value of tan 45°?',options:['0','0.5','1','√2','√3'],correct:2,solution:'tan 45° = sin 45° / cos 45° = (√2/2) / (√2/2) = 1.'},
    {question:'What is the value of 5! (5 factorial)?',options:['60','100','120','150','720'],correct:2,solution:'5! = 5 × 4 × 3 × 2 × 1 = 120.'},
    {question:'Solve for x: 2^(x+1) = 32',options:['2','3','4','5','6'],correct:2,solution:'32 = 2⁵. So 2^(x+1) = 2⁵ → x + 1 = 5 → x = 4.'},
    {question:'What is the equation of a line passing through points (1, 2) and (3, 6)?',options:['y = 2x','y = 2x + 1','y = 3x - 1','y = 4x - 2','y = x + 1'],correct:0,solution:'Slope m = (6-2)/(3-1) = 4/2 = 2. Using point (1,2): y - 2 = 2(x - 1) → y = 2x.'},
    {question:'What is the area of a circle with radius 7 cm? (π = 22/7)',options:['138 cm²','144 cm²','154 cm²','168 cm²','176 cm²'],correct:2,solution:'Area = πr² = (22/7) × 49 = 22 × 7 = 154 cm².'},
    {question:'If log₁₀(x) = 3, what is the value of x?',options:['30','100','300','1,000','10,000'],correct:3,solution:'log₁₀(x) = 3 means 10³ = x. x = 1,000.'},
    {question:'What is the probability of drawing a red card from a standard deck of 52 cards?',options:['1/2','1/4','1/13','1/26','1/52'],correct:0,solution:'There are 26 red cards (hearts and diamonds) out of 52. P = 26/52 = 1/2.'}
  ]}
];

let state = {view:'home', subject:null, qIdx:0, answers:{}, revealed:{}};

function loadState(){const saved=localStorage.getItem('imatpath_qb');if(saved){state=JSON.parse(saved);}}
function saveState(){localStorage.setItem('imatpath_qb',JSON.stringify(state));}
function updateCorrectCount(){let correct=0;subjects.forEach(s=>{s.questions.forEach((q,i)=>{const k=s.id+'-'+i;if(state.revealed[k]&&state.answers[k]===q.correct)correct++;});});localStorage.setItem('imatpath_qb_correct',correct.toString());}

loadState();
updateCorrectCount();

function showToast(m){const t=document.getElementById('toast');document.getElementById('toastText').textContent=m;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),3000);}

function getStats(){let total=0,attempted=0,correct=0;subjects.forEach(s=>{s.questions.forEach((q,i)=>{total++;const k=s.id+'-'+i;if(state.revealed[k]){attempted++;if(state.answers[k]===q.correct)correct++;}});});return{total,attempted,correct};}

function getSubjectStats(sub){let attempted=0,correct=0;sub.questions.forEach((q,i)=>{const k=sub.id+'-'+i;if(state.revealed[k]){attempted++;if(state.answers[k]===q.correct)correct++;}});return{total:sub.questions.length,attempted,correct};}

function render(){const app=document.getElementById('app');const navReset=document.getElementById('navResetBtn');if(state.view==='home'){navReset.style.display='none';app.innerHTML=renderHome();}else if(state.view==='quiz'){navReset.style.display='inline-flex';app.innerHTML=renderQuiz();}else if(state.view==='results'){navReset.style.display='inline-flex';app.innerHTML=renderResults();}window.scrollTo({top:0,behavior:'smooth'});}

function renderHome(){const stats=getStats();let html=`
<section style="min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:110px 56px 60px;position:relative;overflow:hidden;">
  <div class="hero-bg-grid"></div>
  <div class="hero-glow"></div>
  <div class="sec-label" style="justify-content:center;">Practice questions</div>
  <h1 class="sec-title" style="text-align:center;max-width:600px;margin:0 auto 14px;">Question bank<span style="color:var(--teal);">.</span></h1>
  <p class="sec-sub" style="text-align:center;margin:0 auto 32px;">${stats.total} original IMAT-style questions across all sections, each with a fully worked solution.</p>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-val">${stats.total}</div><div class="stat-lbl">Total questions</div></div>
    <div class="stat-card"><div class="stat-val">${subjects.length}</div><div class="stat-lbl">Subjects</div></div>
    <div class="stat-card"><div class="stat-val">${stats.attempted}</div><div class="stat-lbl">Attempted</div></div>
  </div>
</section>
<section style="padding:0 56px 96px;"><div style="max-width:980px;margin:0 auto;"><div class="subj-grid">`;
subjects.forEach(sub=>{html+=`<div class="subj-card" onclick="startQuiz('${sub.id}')"><div class="subj-icon"><i class="fas ${sub.icon}"></i></div><div class="subj-sec">${sub.section}</div><div class="subj-name">${sub.name}</div><div class="subj-desc">${sub.desc}</div><div class="subj-footer"><span class="subj-count">${sub.questions.length} questions</span></div></div>`;});
html+=`</div></div></section>`;return html;}

function renderQuiz(){const sub=subjects.find(s=>s.id===state.subject);const q=sub.questions[state.qIdx];const key=sub.id+'-'+state.qIdx;const isAnswered=state.answers[key]!==undefined;const isRevealed=state.revealed[key];const ss=getSubjectStats(sub);const L=['A','B','C','D','E'];let html=`
<section style="padding:80px 56px 96px;"><div style="max-width:720px;margin:0 auto;">
  <button class="btn-ghost" onclick="goHome()" style="margin-bottom:20px;"><i class="fas fa-arrow-left" style="font-size:0.7rem;"></i> All subjects</button>
  <div class="quiz-header"><div class="quiz-header-icon" style="background:var(--teal-faint);border:1px solid rgba(13,148,136,0.15);color:var(--teal);"><i class="fas ${sub.icon}"></i></div><div class="quiz-header-info"><div class="quiz-header-sec">${sub.section}</div><div class="quiz-header-name">${sub.name}</div></div><div class="quiz-header-score">${ss.correct}/${ss.attempted} correct</div></div>
  <div class="quiz-progress"><span>Question ${state.qIdx+1} of ${sub.questions.length}</span></div>
  <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${(state.qIdx/sub.questions.length)*100}%;"></div></div>
  <div class="q-card">${q.passage?`<div class="q-passage">${q.passage}</div>`:''}<div class="q-text">${q.question}</div>
  <div class="q-opts">${q.options.map((opt,i)=>{let cls='';if(isRevealed){cls+=' locked';if(i===q.correct)cls+=' correct';else if(i===state.answers[key]&&i!==q.correct)cls+=' wrong';}else if(i===state.answers[key])cls+=' selected';return`<button class="q-opt ${cls}" onclick="selectOpt(${i})" ${isRevealed?'disabled':''}><span class="q-opt-letter">${L[i]||''}</span>${opt}</button>`;}).join('')}</div>
  ${!isRevealed&&isAnswered?`<button class="btn-reveal" onclick="reveal()">Reveal solution</button>`:''}
  ${isRevealed?`<div class="solution-panel"><div class="solution-status ${state.answers[key]===q.correct?'is-correct':'is-wrong'}"><i class="fas ${state.answers[key]===q.correct?'fa-circle-check':'fa-circle-xmark'}"></i>${state.answers[key]===q.correct?'Correct!':'Incorrect'}</div><div class="solution-body">${q.solution}</div></div>`:''}
  </div>
  <div class="quiz-nav"><button class="quiz-nav-btn" onclick="prevQ()" ${state.qIdx===0?'disabled':''}><i class="fas fa-chevron-left"></i> Previous</button>${state.qIdx<sub.questions.length-1?`<button class="quiz-nav-btn" onclick="nextQ()">Next <i class="fas fa-chevron-right"></i></button>`:`<button class="quiz-nav-btn primary" onclick="viewResults()">View results</button>`}</div>
</div></section>`;return html;}

function renderResults(){const sub=subjects.find(s=>s.id===state.subject);const ss=getSubjectStats(sub);const pct=ss.attempted>0?Math.round(ss.correct/ss.attempted*100):0;let html=`
<section style="padding:80px 56px 96px;"><div style="max-width:720px;margin:0 auto;">
  <button class="btn-ghost" onclick="goHome()" style="margin-bottom:20px;"><i class="fas fa-arrow-left" style="font-size:0.7rem;"></i> All subjects</button>
  <div class="quiz-header"><div class="quiz-header-icon" style="background:var(--teal-faint);border:1px solid rgba(13,148,136,0.15);color:var(--teal);"><i class="fas ${sub.icon}"></i></div><div class="quiz-header-info"><div class="quiz-header-sec">${sub.section}</div><div class="quiz-header-name">${sub.name} — Results</div></div></div>
  <div class="results-grid"><div class="result-card"><div class="result-value" style="color:var(--teal);">${pct}%</div><div class="result-label">Accuracy</div></div><div class="result-card"><div class="result-value">${ss.correct}/${ss.attempted}</div><div class="result-label">Correct</div></div><div class="result-card"><div class="result-value">${sub.questions.length}</div><div class="result-label">Total</div></div></div>
  <div class="breakdown-card"><div class="breakdown-title">Question breakdown</div>${sub.questions.map((q,i)=>{const k=sub.id+'-'+i;const isRevealed=state.revealed[k];const isCorrect=isRevealed&&state.answers[k]===q.correct;let iconCls='skip',icon='fa-minus',label='Unanswered';if(isCorrect){iconCls='ok';icon='fa-check';label='Correct';}else if(isRevealed){iconCls='fail';icon='fa-xmark';label='Incorrect';}return`<div class="breakdown-row" onclick="jumpTo(${i})"><div class="breakdown-icon ${iconCls}"><i class="fas ${icon}"></i></div><div class="breakdown-q">Q${i+1}</div><div class="breakdown-label">${label}</div><div class="breakdown-arrow"><i class="fas fa-chevron-right"></i></div></div>`;}).join('')}</div>
  <div style="display:flex;justify-content:space-between;margin-top:20px;"><button class="btn-ghost" onclick="jumpTo(0)">Review questions</button><button class="btn-teal" onclick="goHome()">All subjects</button></div>
</div></section>`;return html;}

function goHome(){state.view='home';saveState();render();}
function startQuiz(id){state.view='quiz';state.subject=id;state.qIdx=0;saveState();render();}
function selectOpt(i){const key=state.subject+'-'+state.qIdx;if(state.revealed[key])return;state.answers[key]=i;saveState();render();}
function reveal(){const key=state.subject+'-'+state.qIdx;state.revealed[key]=true;const q=subjects.find(s=>s.id===state.subject).questions[state.qIdx];showToast(state.answers[key]===q.correct?'Correct!':'Incorrect');saveState();updateCorrectCount();render();}
function nextQ(){const sub=subjects.find(s=>s.id===state.subject);if(state.qIdx<sub.questions.length-1){state.qIdx++;saveState();render();}}
function prevQ(){if(state.qIdx>0){state.qIdx--;saveState();render();}}
function jumpTo(i){state.view='quiz';state.qIdx=i;saveState();render();}
function viewResults(){state.view='results';saveState();render();}

render();
</script>
</body>
</html>
