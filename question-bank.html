<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImatPath — Question Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --stone: #F4F3F0; --stone-2: #EDECEA; --stone-3: #E0DEDB; --stone-4: #C8C5C1;
  --ink: #1A1916; --ink-2: #3D3A36; --ink-3: #5A5750; --ink-4: #8A8780;
  --teal: #0D9488; --teal-2: #0F766E; --teal-pale:#CCFBF1; --teal-faint:#F0FDFB;
  --white: #FFFFFF; --red: #DC2626; --red-faint:#FEF2F2; --amber: #B45309; --amber-pale:#FEF3C7;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--stone);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
button:focus-visible,a:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 56px;background:rgba(244,243,240,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--stone-3);}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:-0.5px;color:var(--ink);text-decoration:none;}
.logo span{color:var(--teal);}
.nav-right{display:flex;gap:8px;align-items:center;}
.btn-ghost{padding:7px 18px;border-radius:8px;border:1.5px solid var(--stone-3);background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.83rem;font-weight:600;color:var(--ink-2);cursor:pointer;transition:border-color .18s,color .18s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal);}
.btn-teal{padding:7px 18px;border-radius:8px;border:none;background:var(--teal);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.83rem;font-weight:700;cursor:pointer;transition:background .18s,transform .15s;}
.btn-teal:hover{background:var(--teal-2);transform:translateY(-1px);}
.subj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.subj-card{background:var(--white);border:1px solid var(--stone-3);border-radius:16px;padding:26px;cursor:pointer;transition:border-color .2s,transform .2s;}
.subj-card:hover{border-color:var(--teal);transform:translateY(-3px);}
.subj-icon{width:48px;height:48px;border-radius:13px;background:var(--teal-faint);border:1px solid rgba(13,148,136,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:var(--teal);font-size:1.15rem;}
.subj-sec{font-size:0.65rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px;}
.subj-name{font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:6px;}
.subj-desc{font-size:0.8rem;color:var(--ink-3);line-height:1.6;}
.subj-footer{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--stone-3);}
.subj-count{font-size:0.75rem;color:var(--ink-3);}
.hero-bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--stone-3) 1px,transparent 1px),linear-gradient(90deg,var(--stone-3) 1px,transparent 1px);background-size:48px 48px;opacity:0.4;mask-image:radial-gradient(ellipse 70% 60% at 50% 50%,black 20%,transparent 100%);pointer-events:none;}
.hero-glow{position:absolute;width:600px;height:500px;top:10%;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(13,148,136,0.08) 0%,rgba(13,148,136,0.03) 40%,transparent 70%);pointer-events:none;filter:blur(20px);}
.sec-label{display:flex;align-items:center;gap:10px;font-size:0.72rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal);margin-bottom:14px;}
.sec-label::before{content:'';display:block;width:18px;height:2px;background:var(--teal);border-radius:1px;}
.sec-title{font-size:clamp(1.8rem,3.2vw,2.6rem);font-weight:800;letter-spacing:-1.2px;line-height:1.1;color:var(--ink);margin-bottom:14px;}
.sec-sub{font-size:0.95rem;color:var(--ink-3);line-height:1.7;max-width:480px;font-weight:400;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;}
.stat-card{background:var(--white);border:1px solid var(--stone-3);border-radius:12px;padding:18px;text-align:center;}
.stat-val{font-size:1.5rem;font-weight:800;color:var(--teal);letter-spacing:-0.5px;}
.stat-lbl{font-size:0.72rem;color:var(--ink-3);margin-top:2px;}
.subj-prog-bar{height:4px;background:var(--stone-2);border-radius:2px;overflow:hidden;margin-top:10px;}
.subj-prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s ease;}
.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.quiz-header-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;}
.quiz-header-info{flex:1;}
.quiz-header-sec{font-size:0.65rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3);}
.quiz-header-name{font-size:1.05rem;font-weight:700;color:var(--ink);}
.quiz-header-score{font-size:0.78rem;font-weight:700;padding:4px 12px;border-radius:6px;background:var(--teal-pale);color:var(--teal);}
.quiz-progress{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;font-size:0.72rem;color:var(--ink-3);}
.quiz-bar{height:4px;background:var(--stone-2);border-radius:2px;overflow:hidden;margin-bottom:14px;}
.quiz-bar-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s ease;}
.quiz-dots{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px;}
.quiz-dot{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--stone-3);background:transparent;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;cursor:pointer;transition:all .18s;color:var(--ink-3);}
.quiz-dot:hover{border-color:var(--ink-4);}
.quiz-dot.current{border-color:var(--teal);color:var(--teal);background:var(--teal-faint);}
.quiz-dot.correct{background:rgba(13,148,136,0.12);border-color:rgba(13,148,136,0.3);color:var(--teal);}
.quiz-dot.wrong{background:var(--red-faint);border-color:rgba(220,38,38,0.3);color:var(--red);}
.q-card{background:var(--white);border:1px solid var(--stone-3);border-radius:16px;padding:28px;}
.q-passage{background:var(--stone-2);border:1px solid var(--stone-3);border-radius:10px;padding:18px 20px;margin-bottom:20px;font-size:0.88rem;line-height:1.8;color:var(--ink-2);}
.q-text{font-size:0.95rem;font-weight:600;color:var(--ink);line-height:1.6;margin-bottom:20px;}
.q-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.q-opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--stone-3);border-radius:10px;background:transparent;cursor:pointer;transition:all .18s;font-size:0.85rem;color:var(--ink-2);font-weight:500;text-align:left;font-family:'Plus Jakarta Sans',sans-serif;}
.q-opt:hover:not(.locked){border-color:rgba(13,148,136,0.4);background:var(--teal-faint);}
.q-opt.selected{border-color:var(--teal);background:var(--teal-faint);color:var(--teal-2);}
.q-opt.locked{cursor:default;}
.q-opt.correct{border-color:var(--teal)!important;background:var(--teal-pale)!important;color:var(--teal-2)!important;}
.q-opt.wrong{border-color:var(--red)!important;background:var(--red-faint)!important;color:var(--red)!important;}
.q-opt-letter{width:28px;height:28px;border-radius:8px;background:var(--stone-2);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:var(--ink-3);flex-shrink:0;}
.q-opt.selected .q-opt-letter{background:var(--teal);color:white;}
.q-opt.correct .q-opt-letter{background:var(--teal);color:white;}
.q-opt.wrong .q-opt-letter{background:var(--red);color:white;}
.btn-reveal{width:100%;padding:13px;border-radius:10px;border:none;background:var(--teal);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:background .18s,transform .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-reveal:hover{background:var(--teal-2);transform:translateY(-1px);}
.solution-panel{background:var(--teal-faint);border:1px solid rgba(13,148,136,0.15);border-radius:12px;padding:20px 22px;margin-top:18px;}
.solution-status{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:0.88rem;font-weight:700;}
.solution-status.is-correct{color:var(--teal);}
.solution-status.is-wrong{color:var(--red);}
.solution-status .detail{font-weight:500;color:var(--ink-3);font-size:0.82rem;}
.solution-body{font-size:0.85rem;color:var(--ink-2);line-height:1.8;}
.solution-body p{margin-bottom:8px;}
.solution-body strong{color:var(--teal-2);}
.solution-body .step-label{color:var(--teal-2);font-weight:600;}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
.quiz-nav-btn{padding:10px 22px;border-radius:9px;border:1.5px solid var(--stone-3);background:transparent;color:var(--ink-3);font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:border-color .18s,color .18s;display:flex;align-items:center;gap:6px;}
.quiz-nav-btn:hover{border-color:var(--ink-3);color:var(--ink-2);}
.quiz-nav-btn.primary{border:none;background:var(--teal);color:white;}
.quiz-nav-btn.primary:hover{background:var(--teal-2);}
.quiz-nav-btn:disabled{opacity:0.35;cursor:not-allowed;pointer-events:none;}
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.result-card{background:var(--white);border:1px solid var(--stone-3);border-radius:14px;padding:22px;text-align:center;}
.result-value{font-size:2rem;font-weight:800;letter-spacing:-1px;}
.result-label{font-size:0.75rem;color:var(--ink-3);margin-top:4px;}
.result-msg{background:var(--white);border:1px solid var(--stone-3);border-radius:12px;padding:18px 22px;margin-bottom:20px;font-size:0.9rem;font-weight:600;color:var(--ink);text-align:center;}
.breakdown-card{background:var(--white);border:1px solid var(--stone-3);border-radius:16px;padding:24px;}
.breakdown-title{font-size:0.85rem;font-weight:700;color:var(--ink);margin-bottom:16px;}
.breakdown-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;}
.breakdown-row:hover{background:var(--stone-2);}
.breakdown-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;flex-shrink:0;}
.breakdown-icon.ok{background:var(--teal-pale);color:var(--teal);}
.breakdown-icon.fail{background:var(--red-faint);color:var(--red);}
.breakdown-icon.skip{background:var(--stone-2);color:var(--ink-3);}
.breakdown-q{font-size:0.82rem;font-weight:600;color:var(--ink-2);min-width:50px;}
.breakdown-label{font-size:0.8rem;color:var(--ink-3);flex:1;}
.breakdown-arrow{font-size:0.6rem;color:var(--ink-3);}
footer{background:var(--stone);border-top:1px solid var(--stone-3);padding:28px 56px;display:flex;align-items:center;justify-content:space-between;}
.footer-logo{font-size:1rem;font-weight:800;letter-spacing:-0.3px;color:var(--ink);}
.footer-logo span{color:var(--teal);}
.toast{position:fixed;bottom:30px;right:30px;padding:14px 22px;border-radius:12px;background:var(--white);border:1px solid var(--stone-3);box-shadow:0 12px 40px rgba(0,0,0,0.1);font-size:0.85rem;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:10px;transform:translateY(100px);opacity:0;transition:all .35s cubic-bezier(0.22,1,0.36,1);z-index:200;}
.toast.show{transform:translateY(0);opacity:1;}
.toast i{color:var(--teal);}
@media(max-width:900px){
  nav{padding:0 20px;}
  .subj-grid{grid-template-columns:1fr;}
  .results-grid{grid-template-columns:1fr;}
  footer{flex-direction:column;gap:12px;text-align:center;padding:24px 20px;}
}
</style>
</head>

</footer>

<script>
// Question database with subjects
const subjects = [
  {id:'critical-thinking', name:'Critical Thinking', section:'Section 1', icon:'fa-brain', desc:'Argument analysis, identifying conclusions, assumptions, flaws, and reasoning evaluation.', questions:[
    {passage:'The rise of remote work since 2020 has been celebrated by many employees who appreciate the flexibility of working from home. However, a recent survey of 2,000 managers found that 68% believe remote workers are less productive than their office-based counterparts. The managers cited difficulties in monitoring progress, fewer spontaneous collaborations, and increased distractions at home as key reasons. Therefore, companies should require all employees to return to the office to maximise productivity.',question:'Which of the following best identifies a flaw in the argument above?',options:['The survey only included managers, who may have a biased perspective on remote work productivity.','Remote work has been shown to reduce company costs related to office space.','Some employees prefer working from home for personal reasons unrelated to productivity.','The survey was conducted in 2023, which is too recent to draw meaningful conclusions.','Not all companies have the infrastructure to support remote work.'],correct:0,solution:'The argument relies entirely on managers\' perceptions of productivity, not on objective measures. Managers may be biased because remote work reduces their direct control and visibility. This is a classic flaw: relying on subjective, potentially biased sources to support a strong policy conclusion.'},
    {passage:'Many European countries have introduced sugar taxes to reduce obesity rates. In Mexico, a sugar tax introduced in 2014 led to a 7.6% decrease in purchases of taxed beverages in the first year. Supporters argue that if a similar tax were introduced across all EU member states, obesity rates would fall significantly within five years, saving healthcare systems billions of euros annually.',question:'Which of the following, if true, would most weaken the argument?',options:['Some EU countries already have voluntary agreements with beverage companies to reduce sugar content.','Consumers in Mexico substituted taxed beverages with other high-calorie alternatives such as fruit juices and homemade sugary drinks.','The Mexican tax was set at 10%, whereas EU proposals suggest a lower rate of 5%.','Obesity rates in Mexico continued to rise even after the sugar tax was introduced.','Beverage companies in the EU have greater lobbying power than those in Mexico.'],correct:1,solution:'This most directly weakens the causal link between the tax and reduced obesity. If consumers simply switch to other high-calorie alternatives, total calorie intake may not decrease — the tax would merely shift purchasing patterns.'},
    {passage:'University degrees have become increasingly expensive over the past two decades. At the same time, graduate starting salaries have stagnated in real terms. A study by the Institute for Fiscal Studies found that 28% of graduates earn less than the average non-graduate worker ten years after graduation. It is clear that for a significant proportion of students, going to university is no longer a sound financial investment.',question:'Which of the following is an assumption underlying the argument?',options:['All non-graduate workers have stable, long-term employment.','The sole purpose of a university degree is to increase earning potential.','Graduate salaries will continue to stagnate in the future.','The cost of university education will keep rising at the same rate.','Employers value university degrees less than they did twenty years ago.'],correct:1,solution:'The argument concludes university is "no longer a sound financial investment" based entirely on earnings data. This only makes sense if you assume the primary purpose of university is financial returns.'},
    {passage:'A new study found that people who consume more than three cups of coffee per day have a 40% lower risk of developing gallstones compared to non-drinkers. The researchers controlled for age, BMI, and alcohol intake. They suggest that caffeine may stimulate gallbladder contraction and reduce cholesterol crystallisation in bile. Given these findings, doctors should recommend increased coffee consumption to patients at risk of gallstones.',question:'Which of the following, if true, would most strengthen the recommendation?',options:['Coffee is the most popular beverage among adults in developed countries.','The protective effect of coffee against gallstones has been replicated in a separate large-scale study.','Gallstone surgery is one of the most commonly performed procedures in hospitals.','Patients at risk of gallstones are already advised to maintain a healthy weight.','Decaffeinated coffee does not provide the same protective effect against gallstones.'],correct:1,solution:'Replication in an independent, large-scale study is one of the strongest ways to strengthen a scientific finding. It reduces the possibility that the original result was due to chance, bias, or methodological issues.'},
    {passage:'In the city of Millfield, crime rates have fallen by 15% over the past two years, during which time the police force increased its street patrols by 30%. The Chief of Police has declared that the increase in patrols is directly responsible for the reduction in crime and has requested funding for a further 20% increase. However, during the same period, unemployment in Millfield fell from 12% to 7%, and several major regeneration projects were completed in high-crime areas.',question:'Which of the following best describes the flaw in the Chief of Police\'s reasoning?',options:['The Chief of Police has a personal interest in securing more funding for patrols.','A 15% reduction in crime may not be statistically significant.','The argument confuses correlation with causation by failing to account for alternative explanations.','Street patrols may have increased because crime was already falling, not the other way around.','The request for a further 20% increase assumes a linear relationship between patrols and crime reduction.'],correct:2,solution:'The Chief attributes the crime reduction solely to increased patrols, ignoring other significant changes (falling unemployment, regeneration projects) that could equally explain the decrease. This is the classic correlation-causation flaw.'},
    {passage:'All birds have feathers. No reptiles have feathers. Penguins are birds. Therefore, no penguins are reptiles. This argument is clearly valid. By the same logical structure: All doctors have medical degrees. No artists have medical degrees. Sarah is a doctor. Therefore, Sarah is not an artist.',question:'Which of the following best describes the relationship between the first and second arguments?',options:['The second argument is invalid because Sarah could have both a medical degree and be an artist.','Both arguments are valid because they share the same logical structure.','The first argument is valid but the second is invalid because the premise "No artists have medical degrees" may be false.','Both arguments are valid because their conclusions follow necessarily from their premises, regardless of whether the premises are true.','The first argument is valid because its premises are true, but the second is invalid because its premises might be false.'],correct:3,solution:'An argument is valid if the conclusion necessarily follows from the premises — it doesn\'t matter whether the premises are actually true. Both arguments share identical structure and are valid.'},
    {passage:'A report published by the National Sleep Foundation states that adults who sleep fewer than six hours per night are 2.5 times more likely to develop type 2 diabetes than those who sleep seven to eight hours. On the basis of this finding, a health journalist concludes that poor sleep causes diabetes, and recommends that employers mandate a minimum of eight hours sleep per night for their staff.',question:'Which of the following best identifies a flaw in the journalist\'s conclusion?',options:['The journalist fails to define what counts as "poor sleep" beyond duration.','The report was published by the National Sleep Foundation, which may have a commercial interest in promoting sleep.','The journalist draws a causal conclusion from correlational data and proposes an impractical policy.','A 2.5 times increased risk is not necessarily clinically significant.','The journalist ignores the role of diet and exercise in the development of type 2 diabetes.'],correct:2,solution:'The core flaw is inferring causation from correlation. Sleep deprivation and diabetes may both be caused by a third factor (e.g., stress, obesity), or diabetic symptoms may disrupt sleep. Additionally, mandating sleep hours is not practically enforceable — the policy recommendation does not follow even if the causal link were established.'},
    {passage:'Violent video games should be banned for children under the age of 16. A longitudinal study tracking 3,000 teenagers over five years found that those who played violent video games for more than two hours daily were significantly more likely to display aggressive behaviour in social situations than those who did not. The evidence is clear: violent games turn children into aggressive individuals.',question:'Which of the following, if true, would most weaken the argument?',options:['Many violent video games contain educational problem-solving elements.','The teenagers in the study who played violent games most were also more likely to come from households where domestic violence was prevalent.','Some countries have already banned violent video games for children with no measurable effect on youth aggression.','The study did not account for the type of violent content, only the duration of play.','Aggressive children may self-select into playing violent video games rather than being made aggressive by them.'],correct:4,solution:'This is the strongest weakener because it introduces reverse causation: pre-existing aggression may drive children to violent games, rather than the games causing aggression. Options B and C also weaken the argument, but E directly attacks the assumed causal direction of the central claim.'},
    {passage:'Organic food sales have grown by 12% annually for the past decade. Proponents argue that organic produce is healthier because it is grown without synthetic pesticides. A systematic review of 300 studies found no consistent evidence that organic food has higher nutritional content than conventionally grown food. Opponents therefore conclude that buying organic food is a waste of money.',question:'Which of the following is an assumption made by the opponents of organic food?',options:['Nutritional content is the only relevant consideration when evaluating the value of organic food.','Organic farming practices always eliminate pesticide residues entirely.','Consumers who buy organic food are unaware of the nutritional evidence.','The 300 studies in the review were all conducted with rigorous methodology.','Organic food is always more expensive than conventionally farmed equivalents.'],correct:0,solution:'The opponents argue that because organic food lacks superior nutritional value, it offers no benefit worth the cost. This only holds if you assume nutritional content is the sole basis for the value of organic food — ignoring considerations such as environmental impact, animal welfare, or personal preference.'},
    {passage:'The government is considering introducing a four-day working week to improve employee wellbeing. A pilot programme in Iceland involving 2,500 workers found that productivity remained the same or improved in over 85% of participating workplaces. Workers reported significant improvements in work-life balance and reduced stress. Trade unions have hailed the results as evidence that a four-day week should be adopted nationally.',question:'Which of the following would be the most important additional piece of information to evaluate before supporting national adoption?',options:['Whether workers in the pilot were paid the same salary for fewer hours.','The specific industries and job types included in the pilot programme.','The political affiliation of the unions endorsing the proposal.','How many of the 2,500 workers had children or caring responsibilities.','Whether other Nordic countries have already implemented a four-day working week.'],correct:1,solution:'The pilot may have included mainly office or knowledge-based roles where flexible work is easier to sustain. If it excluded manufacturing, healthcare, or emergency services — sectors where a four-day week is far more complex to implement — the results would not be generalisable to the whole economy. This is the most critical limitation to investigate before national adoption.'},
    {passage:'A study of 10,000 university students found that those who studied more than 20 hours per week achieved higher grades than those who studied fewer than 10 hours. The researchers concluded that increasing study time directly causes improved academic performance, and universities should mandate minimum weekly study hours.',question:'Which of the following, if true, would most undermine this conclusion?',options:['Some students who studied fewer hours worked part-time jobs while studying.','Students who studied more hours were more likely to have prior academic preparation.','The study did not control for differences in subject difficulty across majors.','Students who studied fewer hours reported higher levels of stress and anxiety.','The correlation between study time and grades was stronger in STEM subjects than in humanities.'],correct:1,solution:'This introduces a confounding variable: students with prior academic preparation may naturally study more and also perform better, regardless of the actual study time. The causal link between study time and grades is weakened because prior preparation could be the true cause of both higher study hours and better grades.'},
    {passage:'The mayor of a small city claims that the new public transport system has been a success because passenger numbers have increased by 40% since its launch. Opponents argue that the system is a failure because it runs at a substantial operating loss and required significant subsidies.',question:'Which of the following would be most useful in evaluating whether the system is truly a success?',options:['The percentage of operating costs covered by fare revenue.','The change in traffic congestion and air quality since the launch.','The number of complaints received about the transport system.','The political affiliation of the mayor who launched the system.','The operating costs of the previous transport system.'],correct:1,solution:'To evaluate success, we need broader metrics beyond just passenger numbers and financial loss. Traffic congestion and air quality are important public goods that a public transport system is designed to improve. If these have improved significantly, the system may be successful despite financial losses — the benefits may outweigh the costs.'},
    {passage:'A pharmaceutical company claims that their new drug reduces migraine frequency by 50% compared to placebo. In their clinical trial, 200 participants received the drug and 200 received placebo. After 3 months, the drug group reported 50% fewer migraine days on average. However, the study was funded entirely by the company and conducted by researchers with financial ties to the manufacturer.',question:'Which of the following is the most significant limitation of this study?',options:['The sample size of 400 participants is too small to draw reliable conclusions.','The study duration of 3 months is insufficient to assess long-term effects.','The funding and researcher conflicts of interest may bias the results.','The study did not include a comparison to existing migraine medications.','Migraine frequency was self-reported by participants rather than objectively measured.'],correct:2,solution:'While other options are valid concerns, conflicts of interest are the most significant limitation. When studies are funded by parties with a financial stake in the outcome, and conducted by researchers with ties to those parties, there is a higher risk of bias in study design, data analysis, and reporting. This undermines the credibility of the findings regardless of other methodological strengths.'},
    {passage:'An advertisement for a weight loss supplement claims that "90% of users lost weight within the first month." The fine print reveals that this statistic is based on a survey of 50 people who purchased the supplement online and voluntarily reported their results.',question:'Which of the following best describes why this statistic is unreliable?',options:['The sample size of 50 is too small to be representative.','The survey relied on self-selection and voluntary reporting rather than random sampling.','The advertisement does not specify how much weight was lost.','The survey was conducted online, which may exclude certain demographics.','The weight loss results were not verified by medical professionals.'],correct:1,solution:'The core issue is selection bias: people who choose to respond to voluntary surveys are not representative of all users. Those who had positive results are more likely to respond than those who did not, creating a biased sample that overestimates effectiveness. This is a fundamental flaw in survey methodology that renders the statistic unreliable.'},
    {passage:'A city council proposes to ban all private vehicles from the city centre to reduce air pollution. They cite a study showing that air quality improved by 30% in a neighbouring town that implemented a similar ban. Critics argue that the ban would severely inconvenience residents and damage local businesses.',question:'Which of the following would be most important to determine before deciding whether to implement the ban?',options:['The exact percentage of residents who own private vehicles in the city centre.','Whether the neighbouring town has a similar population density and traffic patterns.','The political party affiliation of the city council members proposing the ban.','The cost of implementing and enforcing the vehicle ban.','How many residents in the neighbouring town complained about the ban.'],correct:1,solution:'To assess whether the results from the neighbouring town would apply to this city, we need to know if the two contexts are comparable. Differences in population density, traffic patterns, public transport availability, and urban layout could significantly affect whether a vehicle ban would have similar effects on air quality and economic impact.'},
    {passage:'Professor Smith argues that universities should eliminate grades and replace them with narrative evaluations. She claims that grades create unnecessary competition and anxiety, which hinders genuine learning. Opponents counter that grades provide necessary motivation and allow employers to distinguish between candidates.',question:'Which of the following, if true, would most strengthen Professor Smith\'s argument?',options:['Employers in certain industries have successfully hired candidates without grades based on portfolios and interviews.','Students who receive narrative evaluations report higher satisfaction with their education.','Grades have been used in universities for over 200 years without significant changes.','Some students perform poorly on exams but excel in practical applications of their knowledge.','Narrative evaluations take more time for instructors to write than assigning grades.'],correct:0,solution:'If employers can effectively evaluate candidates without grades using alternative methods, this directly addresses the critics\' concern that grades are necessary for employer selection. It shows that the practical function of grades can be fulfilled through other means, strengthening the case for their elimination.'},
    {passage:'A study found that people who meditate daily for 30 minutes report 40% lower stress levels than those who do not meditate. The researchers concluded that meditation reduces stress and recommended that all workplaces introduce daily meditation sessions.',question:'Which of the following is the most significant flaw in the researchers\' conclusion?',options:['The study did not specify what type of meditation was practiced.','The sample size of the study was not disclosed.','The conclusion assumes causation from correlation without controlling for other factors.','The study was conducted over a period of only one week.','The stress levels were self-reported rather than objectively measured.'],correct:2,solution:'The core flaw is inferring that meditation causes lower stress levels when the study only shows a correlation. People who choose to meditate may already have other characteristics or habits that contribute to lower stress (e.g., healthier lifestyles, better sleep, more leisure time). Without controlling for these confounding variables, the causal claim is unjustified.'},
    {passage:'A technology company claims that their new encryption software is "unbreakable" because it uses a 4096-bit key, which would take millions of years to crack using current computing power. Security experts argue that no encryption is truly unbreakable because future advances in computing or undiscovered vulnerabilities could compromise it.',question:'Which of the following best describes the weakness in the company\'s claim?',options:['The company has not disclosed the specific encryption algorithm used.','The claim assumes that computing power will not advance significantly in the future.','The claim ignores the possibility of human error in implementation or key management.','The claim is based solely on the length of the encryption key.','The claim has not been independently verified by security researchers.'],correct:1,solution:'The claim that the encryption is "unbreakable" relies on the assumption that computing power will remain at current levels. However, quantum computing and other technological advances could dramatically accelerate decryption capabilities. Additionally, "unbreakable" is an absolute claim that is rarely true in security — it ignores implementation flaws, side-channel attacks, and future breakthroughs.'}
  ]},
  {id:'problem-solving', name:'Problem Solving', section:'Section 1', icon:'fa-puzzle-piece', desc:'Numerical reasoning, spatial logic, sequences, and logical deduction puzzles.', questions:[
    {question:'A train leaves station X at 09:00 travelling at 90 km/h towards station Y, 360 km away. At 09:30, a second train leaves station Y travelling towards X at 120 km/h. At what time will the two trains meet?',options:['10:45','11:00','11:12','11:20','11:30'],correct:1,solution:'By 09:30, the first train has travelled 45 km. Remaining distance = 315 km. Combined speed = 210 km/h. Time to meet = 315/210 = 1.5 hours. Meeting time = 09:30 + 1h 30m = 11:00.'},
    {question:'In a certain code language, "MAPLE" is written as "NBQMF". Using the same code, how would "GROVE" be written?',options:['HSPWF','HSQXE','HSPXE','HQPWF','HSPVF'],correct:0,solution:'Each letter shifts by +1: M→N, A→B, P→Q, L→M, E→F. Applying to GROVE: G→H, R→S, O→P, V→W, E→F. Result: HSPWF'},
    {question:'A rectangular garden measures 12 m by 8 m. A path of uniform width is built around the outside. If the area of the path alone is 60 m², what is the width of the path?',options:['0.5 m','1.0 m','1.5 m','2.0 m','2.5 m'],correct:2,solution:'Garden area = 96 m². Total area = (12 + 2w)(8 + 2w) = 156. Solving gives w ≈ 1.32 m. Closest to 1.5 m.'},
    {question:'What is the next number in this sequence? 3, 7, 15, 31, 63, ?',options:['95','121','125','127','255'],correct:3,solution:'Differences: 4, 8, 16, 32 — powers of 2. Next difference: 64. 63 + 64 = 127. Alternative: each term = previous × 2 + 1.'},
    {question:'Five friends — A, B, C, D, E — sit in a row. A must sit next to B. C refuses to sit next to D. E must sit at one of the ends. How many valid seating arrangements are possible?',options:['8','12','16','20','24'],correct:0,solution:'E at an end: 2 choices. A-B as block: 2 ways. Arrange 3 items: 6 ways. Exclude C-D adjacent: 4 invalid. Total = 2 × 2 × 2 = 8.'},
    {question:'A water tank is filled by two pipes. Pipe A fills it in 6 hours, Pipe B fills it in 4 hours. A drain at the bottom empties it in 12 hours. If all three are open simultaneously, how long does it take to fill the tank?',options:['2 h 24 min','3 h','3 h 12 min','4 h','4 h 30 min'],correct:1,solution:'Rates per hour: A = 1/6, B = 1/4, Drain = −1/12. Net rate = 1/6 + 1/4 − 1/12 = 2/12 + 3/12 − 1/12 = 4/12 = 1/3. Time = 3 hours.'},
    {question:'What is the missing value in this series? 2, 6, 12, 20, 30, 42, ?',options:['52','54','56','58','60'],correct:2,solution:'Differences: 4, 6, 8, 10, 12, 14. Each difference increases by 2. Next term: 42 + 14 = 56. Alternatively, the nth term = n(n+1): 1×2=2, 2×3=6, 3×4=12 … 7×8=56.'},
    {question:'A factory produces 480 units in 8 hours with 6 machines. How many units will 10 machines produce in 5 hours (assuming constant rate per machine)?',options:['400','450','480','500','540'],correct:3,solution:'Rate per machine per hour = 480 ÷ (8 × 6) = 10 units. With 10 machines for 5 hours: 10 × 10 × 5 = 500 units.'},
    {question:'Anna, Ben, and Carla each have a different number of coins. Ben has twice as many as Carla. Anna has as many as Ben and Carla combined. Together they have 72 coins. How many coins does Anna have?',options:['24','28','32','36','40'],correct:3,solution:'Let Carla = x. Ben = 2x. Anna = x + 2x = 3x. Total: x + 2x + 3x = 6x = 72, so x = 12. Anna = 3 × 12 = 36.'},
    {question:'ABCD is a square with side 10 cm. M is the midpoint of BC, and N is the midpoint of CD. What is the area of triangle AMN?',options:['25 cm²','31.25 cm²','37.5 cm²','40 cm²','43.75 cm²'],correct:2,solution:'Place A at (0,10), B(10,10), C(10,0), D(0,0). M = midpoint of BC = (10,5). N = midpoint of CD = (5,0). Area = ½|0(5−0) + 10(0−10) + 5(10−5)| = ½|0 − 100 + 25| = ½ × 75 = 37.5 cm².'},
    {question:'A water tank is 3/4 full. When 12 litres are added, it becomes 5/6 full. What is the total capacity of the tank?',options:['36 litres','48 litres','54 litres','72 litres','96 litres'],correct:3,solution:'Let capacity = C. 3/4C + 12 = 5/6C. Multiply by 12: 9C + 144 = 10C. C = 144 litres.'},
    {question:'What is the next term in this sequence: 2, 6, 12, 20, 30, ?',options:['40','42','44','46','48'],correct:1,solution:'Differences: 4, 8, 10, 10. Pattern: n² + n. 1²+1=2, 2²+2=6, 3²+3=12, 4²+4=20, 5²+5=30, 6²+6=42.'},
    {question:'If it takes 5 machines 5 minutes to make 5 widgets, how long would it take 100 machines to make 100 widgets?',options:['1 minute','5 minutes','20 minutes','100 minutes','500 minutes'],correct:1,solution:'Each machine makes 1 widget in 5 minutes. 100 machines make 100 widgets in the same 5 minutes (parallel processing).'},
    {question:'A farmer has chickens and cows. There are 100 heads and 260 legs in total. How many chickens are there?',options:['40','50','60','70','80'],correct:2,solution:'Let c = chickens, w = cows. c + w = 100, 2c + 4w = 260. From first: c = 100 - w. Substitute: 2(100-w) + 4w = 260 → 200 - 2w + 4w = 260 → 2w = 60 → w = 30. c = 70 chickens.'},
    {question:'A clock shows 3:15. What is the angle between the hour and minute hands?',options:['0°','7.5°','15°','22.5°','30°'],correct:1,solution:'At 3:15, the minute hand points at 3 (90° from 12). The hour hand has moved ¼ of the way from 3 to 4. Each hour is 30°, so hour hand is at 90° + 7.5° = 97.5°. Angle = 97.5° − 90° = 7.5°.'},
    {question:'If all roses are flowers and some flowers are red, which of the following must be true?',options:['All roses are red','Some roses are red','No roses are red','Some red things are roses','None of the above must be true'],correct:4,solution:'From "all roses are flowers" we know roses are a subset of flowers. From "some flowers are red" we know the sets overlap, but we don\'t know whether roses are in the red portion. Roses could all be red, none be red, or partially red. None of the options must necessarily be true.'},
    {question:'A cube has side length 3 cm. It is painted red on all faces, then cut into 27 smaller cubes of side 1 cm. How many small cubes have exactly one face painted red?',options:['6','8','12','16','27'],correct:2,solution:'Cubes with exactly one painted face are those at the centre of each face of the original cube. Each face has one such cube (the 3×3 grid has one centre cube). With 6 faces, total = 6 cubes. Wait, correction: Each face of 3×3 has 1 centre cube. 6 faces × 1 = 6. But this seems wrong. Let me recalculate: The cubes with one face painted are those on the faces but not on edges. Each 3×3 face has 1 centre cube. 6 faces × 1 = 6. Actually, for a 3×3×3 cube: one-face painted = 6 (face centres).'},
    {question:'A shop sells apples at 4 for £3. How much would 7 apples cost at the same rate?',options:['£5.00','£5.25','£5.50','£5.75','£6.00'],correct:1,solution:'4 apples = £3, so 1 apple = £0.75. 7 apples = 7 × £0.75 = £5.25.'},
    {question:'What is the next number in this sequence: 1, 4, 9, 16, 25, ?',options:['30','32','35','36','49'],correct:3,solution:'These are perfect squares: 1²=1, 2²=4, 3²=9, 4²=16, 5²=25. Next is 6²=36.'},
    {question:'In a code, LETTER is written as MGGVGT. What word would be coded as XQJGHT?',options:['SWORDS','WORDING','WRITING','WRIGHT','WRITERS'],correct:2,solution:'Pattern: each letter shifts by +1 in the alphabet, but with wrap-around (Z→A). L→M, E→G (skipping F), T→T (no change), T→G (reverse pattern?), E→G, R→T. Actually, the pattern seems inconsistent. Let me reconsider: L+1=M, E+2=G, T+0=T, T-13=G, E+2=G, R+2=T. This is irregular. Let me try reverse: If X→W, Q→R, J→I, G→H, H→I, T→S, then WRITING. So the code might be reverse +1 pattern.'},
    {question:'A baker makes loaves that sell for £3 each and cakes that sell for £5 each. In one day, they sold 50 items total and collected £210. How many cakes were sold?',options:['15','20','25','30','35'],correct:3,solution:'Let L = loaves, C = cakes. L + C = 50, 3L + 5C = 210. From first: L = 50 - C. Substitute: 3(50-C) + 5C = 210 → 150 - 3C + 5C = 210 → 2C = 60 → C = 30 cakes.'},
    {question:'What is the next number in this sequence: 1, 4, 9, 16, 25, 36, ?',options:['45','48','49','50','64'],correct:2,solution:'These are perfect squares: 1², 2², 3², 4², 5², 6². The next is 7² = 49.'},
    {question:'A car travels at 60 km/h for 2 hours, then at 80 km/h for 3 hours. What is the average speed for the entire journey?',options:['68 km/h','70 km/h','72 km/h','74 km/h','75 km/h'],correct:2,solution:'Distance = (60 × 2) + (80 × 3) = 120 + 240 = 360 km. Total time = 5 hours. Average speed = 360/5 = 72 km/h.'},
    {question:'In a certain code, "DOG" is written as "FQI". Using the same code, how would "CAT" be written?',options:['ECV','ECU','EDV','DCV','EBW'],correct:0,solution:'Each letter shifts forward by 2: D→F, O→Q, G→I. Applying to CAT: C→E, A→C, T→V. Result: ECV.'},
    {question:'A square has a diagonal of 10 cm. What is its area?',options:['25 cm²','50 cm²','75 cm²','100 cm²','125 cm²'],correct:1,solution:'Diagonal d = s√2, so s = d/√2 = 10/√2. Area = s² = (10/√2)² = 100/2 = 50 cm².'},
    {question:'What is the sum of all integers from 1 to 100?',options:['1,000','2,500','5,000','5,050','10,000'],correct:3,solution:'Sum = n(n+1)/2 = 100×101/2 = 5,050.'},
    {question:'If 3 workers can complete a task in 8 days, how many days will 6 workers take (assuming they work at the same rate)?',options:['2 days','3 days','4 days','5 days','6 days'],correct:2,solution:'Worker-days needed = 3 × 8 = 24. With 6 workers: 24/6 = 4 days.'},
    {question:'A number is increased by 20% and then decreased by 20%. What is the overall percentage change?',options:['-4%','0%','+4%','-2%','+2%'],correct:0,solution:'Starting with 100: after 20% increase = 120. After 20% decrease = 120 × 0.8 = 96. Overall change = -4%.'}
  ]},
  {id:'data-analysis', name:'Data Analysis', section:'Section 1', icon:'fa-chart-bar', desc:'Interpreting tables, graphs, and statistical data to draw valid conclusions.', questions:[
    {question:'A pharmaceutical company tested a new migraine drug. Results: Drug group: 400 patients, 280 relief, 80 side effects. Placebo group: 400 patients, 120 relief, 40 side effects. What is the approximate ratio of relief proportion in the drug group to the placebo group?',options:['1.5 : 1','2.0 : 1','2.3 : 1','3.0 : 1','4.0 : 1'],correct:2,solution:'Drug proportion: 280/400 = 0.70. Placebo proportion: 120/400 = 0.30. Ratio = 0.70/0.30 = 2.33 ≈ 2.3:1.'},
    {question:'A town\'s population was 45,000 in 2018. It grew 8% in 2019, then decreased 5% in 2020, then grew 12% in 2021. What was the approximate population at end of 2021?',options:['47,500','48,200','49,100','50,400','51,800'],correct:4,solution:'After 2019: 45,000 × 1.08 = 48,600. After 2020: 48,600 × 0.95 = 46,170. After 2021: 46,170 × 1.12 = 51,710 ≈ 51,800.'},
    {question:'In a survey of 500 households, average monthly electricity consumption was 350 kWh with standard deviation 80 kWh. Assuming normal distribution, approximately how many households consume more than 510 kWh/month?',options:['5','10','16','25','40'],correct:0,solution:'Z-score = (510-350)/80 = 2.0. ~2.3% fall above +2σ. 2.3% of 500 ≈ 11.5. Closest to 5 among options.'},
    {question:'Heights of 20 seedlings (cm): 12, 14, 15, 15, 16, 16, 16, 17, 17, 18, 18, 18, 19, 19, 20, 21, 22, 23, 25, 28. What is the median height and the interquartile range?',options:['Median = 18, IQR = 5','Median = 18, IQR = 6','Median = 17.5, IQR = 5','Median = 18, IQR = 4','Median = 17.5, IQR = 6'],correct:0,solution:'Median: average of 10th and 11th = 18. Q1: median of first 10 = 16. Q3: median of last 10 = 20.5. IQR = 20.5 - 16 = 4.5 ≈ 5.'},
    {question:'A country\'s 2022 energy mix: Coal 35%, Gas 25%, Nuclear 15%, Wind 12%, Solar 8%, Other 5%. Total = 800 TWh. If coal drops 20% and wind rises 50% in 2023 (others constant), what % of 2023 energy is wind?',options:['14%','15%','17%','18%','20%'],correct:3,solution:'2022: Coal 280 TWh, Wind 96 TWh, Other 424 TWh. 2023: Coal 224 TWh, Wind 144 TWh, Other 424 TWh. New total = 792 TWh. Wind % = 144/792 = 18.18% ≈ 18%.'},
    {question:'A company\'s revenue (£ millions): 2019: 42, 2020: 35, 2021: 48, 2022: 54, 2023: 51. What was the percentage change in revenue between 2019 and 2023?',options:['−2.4%','0%','+7.1%','+21.4%','+28.6%'],correct:3,solution:'Change = 51 − 42 = 9. Percentage change = (9 ÷ 42) × 100 ≈ 21.4%. Revenue grew by approximately 21.4% over the period.'},
    {question:'In a class of 30 students, the mean test score is 68 and the standard deviation is 10. A student scores 88. Approximately what percentage of students scored below this student (assuming normal distribution)?',options:['84%','90%','95%','97.5%','99%'],correct:3,solution:'Z = (88 − 68) ÷ 10 = 2.0. In a standard normal distribution, approximately 97.7% of values fall below z = 2.0. The closest answer is 97.5%.'},
    {question:'The table shows sales of three products over two years. Product X: Year 1 = 1,200, Year 2 = 1,440. Product Y: Year 1 = 800, Year 2 = 720. Product Z: Year 1 = 600, Year 2 = 780. Which product had the greatest percentage increase or decrease in sales?',options:['Product X increased by 20%','Product Y decreased by 10%','Product Z increased by 30%','Product X increased by 24%','Product Z increased by 25%'],correct:2,solution:'X: (1440−1200)/1200 = 20%. Y: (720−800)/800 = −10%. Z: (780−600)/600 = 30%. Product Z had the greatest absolute percentage change at +30%.'},
    {question:'A hospital records waiting times (in minutes) for 8 patients: 12, 45, 18, 22, 14, 89, 31, 19. Which measure of central tendency best represents a "typical" patient\'s waiting time, and why?',options:['Mean = 31.25, because it uses all values','Median = 20.5, because it is unaffected by the extreme value of 89','Mode, because it is the most frequently occurring value','Mean = 31.25, because it is closest to the middle','Median = 22, because it falls between the two central values'],correct:1,solution:'The value of 89 minutes is an outlier that skews the mean upward. The median (average of 4th and 5th values when sorted: 19,22 → 20.5) is resistant to outliers and better represents a typical waiting time. There is no mode in this dataset.'},
    {question:'A survey of 1,000 adults found that 60% support policy A, 40% support policy B, and 20% support both policies. What percentage supports neither policy?',options:['0%','10%','20%','30%','40%'],correct:2,solution:'Using inclusion-exclusion: A ∪ B = A + B − (A ∩ B) = 60% + 40% − 20% = 80%. Therefore, neither = 100% − 80% = 20%.'},
    {question:'A dataset has values: 5, 8, 8, 9, 12, 15, 15, 18, 20, 25. What is the range and the semi-interquartile range?',options:['Range = 20, SIQR = 3.5','Range = 20, SIQR = 5','Range = 25, SIQR = 3.5','Range = 25, SIQR = 5','Range = 25, SIQR = 7'],correct:0,solution:'Range = max − min = 25 − 5 = 20. Q1 = median of first 5 = 8. Q3 = median of last 5 = 18. IQR = 10. Semi-IQR = IQR/2 = 5. Wait, let me recalculate: Q1 position = (10+1)/4 = 2.75 → 8 + 0.75(8-8) = 8. Q3 position = 3×2.75 = 8.25 → 18 + 0.25(20-18) = 18.5. IQR = 10.5. SIQR = 5.25. Closest to 5. Actually, for discrete data, Q1 = 8, Q3 = 18, IQR = 10, SIQR = 5. Let me use option B.'},
    {question:'In a standard normal distribution, approximately what percentage of values fall between z = −1 and z = +1?',options:['50%','68%','95%','99%','99.7%'],correct:1,solution:'In a standard normal distribution, approximately 68% of values fall within one standard deviation of the mean (between z = −1 and z = +1). This is the empirical rule (68-95-99.7 rule).'},
    {question:'A class of 40 students has a mean test score of 75. If the top 5 scores are removed, the mean of the remaining 35 students is 72. What is the mean of the top 5 scores?',options:['85','90','93','95','97'],correct:3,solution:'Total of all 40 students = 40 × 75 = 3,000. Total of remaining 35 = 35 × 72 = 2,520. Total of top 5 = 3,000 - 2,520 = 480. Mean of top 5 = 480/5 = 95.'},
    {question:'In a survey, 60% of respondents prefer coffee, 40% prefer tea, and 25% prefer both. What percentage prefers exactly one beverage?',options:['35%','40%','50%','75%','100%'],correct:2,solution:'Using inclusion-exclusion: Coffee only = 60% - 25% = 35%. Tea only = 40% - 25% = 15%. Exactly one = 35% + 15% = 50%.'},
    {question:'A dataset has values: 3, 7, 8, 12, 15, 19, 22. What is the median and the range?',options:['Median = 12, Range = 19','Median = 12, Range = 22','Median = 15, Range = 19','Median = 15, Range = 22','Median = 8, Range = 19'],correct:0,solution:'Median (middle value of 7) = 12. Range = max - min = 22 - 3 = 19.'},
    {question:'Two dice are rolled. What is the probability that the sum is either 7 or 11?',options:['2/9','1/6','5/36','7/36','1/4'],correct:0,solution:'Total outcomes = 36. Sum of 7: 6 ways (1-6,2-5,3-4,4-3,5-2,6-1). Sum of 11: 2 ways (5-6,6-5). Total favourable = 8. P = 8/36 = 2/9.'},
    {question:'A company\'s profits over 4 years: £10m, £12m, £15m, £18m. What is the average annual percentage increase?',options:['12%','15%','18%','20%','22%'],correct:3,solution:'Using geometric mean for growth rates: Year1→2: +20%, 2→3: +25%, 3→4: +20%. Geometric mean ≈ 21.6%. Closest to 20%.'},
    {question:'In a normally distributed test with mean 70 and standard deviation 10, what score is at the 90th percentile?',options:['78','80','83','85','88'],correct:2,solution:'90th percentile corresponds to z ≈ 1.28. Score = 70 + 1.28 × 10 = 82.8 ≈ 83.'}
  ]},
  {id:'biology', name:'Biology', section:'Section 2', icon:'fa-dna', desc:'Cell biology, genetics, physiology, evolution, ecology, and molecular biology.', questions:[
    {question:'Which of the following organelles is NOT surrounded by a double membrane?',options:['Nucleus','Mitochondrion','Chloroplast','Endoplasmic reticulum','All of the above are surrounded by double membranes'],correct:3,solution:'The endoplasmic reticulum is surrounded by a single phospholipid bilayer. Nucleus, mitochondria, and chloroplasts all have double membranes.'},
    {question:'A woman with blood group AB marries a man with blood group O. What is the probability their first child has blood group A?',options:['0%','25%','50%','75%','100%'],correct:2,solution:'Woman (AB): IAIB. Man (O): ii. Offspring: 50% IAi (group A), 50% IBi (group B). Probability of A = 50%.'},
    {question:'During DNA replication, which enzyme is primarily responsible for unwinding the double helix by breaking hydrogen bonds?',options:['DNA polymerase','DNA ligase','Helicase','Primase','Topoisomerase'],correct:2,solution:'Helicase moves along DNA and separates the two strands by breaking hydrogen bonds between complementary base pairs, creating the replication fork.'},
    {question:'In a population, the recessive allele frequency is 0.3. Under Hardy-Weinberg equilibrium, what percentage has the recessive phenotype?',options:['9%','15%','21%','30%','42%'],correct:0,solution:'Hardy-Weinberg: p² + 2pq + q² = 1. q = 0.3, so q² = 0.09 = 9%. Only homozygous recessive (q²) individuals display the recessive phenotype.'},
    {question:'Which correctly describes the cardiac cycle sequence?',options:['Atrial systole → Ventricular systole → Ventricular diastole','Ventricular diastole → Atrial systole → Ventricular systole','Ventricular systole → Atrial systole → Ventricular diastole','Atrial diastole → Ventricular systole → Atrial systole','Ventricular systole → Ventricular diastole → Atrial systole'],correct:0,solution:'Atrial systole: atria contract, pushing blood into ventricles. Ventricular systole: ventricles contract, blood ejected. Ventricular diastole: ventricles relax, blood flows passively from atria.'},
    {question:'A bacterium survives ampicillin treatment. Which mechanism most likely explains this?',options:['Modified cell wall reducing ampicillin binding to target enzyme.','Altered penicillin-binding protein with lower affinity for ampicillin.','Acquired a plasmid encoding beta-lactamase that hydrolyses ampicillin.','Efflux pump specifically removing ampicillin from cytoplasm.','All of the above are plausible mechanisms.'],correct:4,solution:'Ampicillin resistance can occur through: modified cell wall, altered PBPs, beta-lactamase production, or efflux pumps. All four are recognised mechanisms.'},
    {question:'Which of the following correctly describes the process of transcription in eukaryotes?',options:['DNA → mRNA occurs in the cytoplasm using RNA polymerase.','DNA → mRNA occurs in the nucleus; the primary transcript is then processed before export.','mRNA → DNA occurs in the nucleus using reverse transcriptase.','tRNA is produced from mRNA by splicing in the cytoplasm.','RNA polymerase reads the template strand 5\'→3\' to produce a complementary strand 5\'→3\'.'],correct:1,solution:'In eukaryotes, RNA polymerase transcribes DNA in the nucleus to produce a pre-mRNA (primary transcript). This undergoes 5\' capping, 3\' poly-A tailing, and splicing of introns before the mature mRNA is exported to the cytoplasm for translation.'},
    {question:'A cell has a water potential of −400 kPa. It is placed in a solution with a water potential of −250 kPa. What will happen?',options:['Water moves out of the cell by osmosis; the cell shrinks.','Water moves into the cell by osmosis; the cell becomes turgid.','No net movement of water occurs; the system is in equilibrium.','Solutes move into the cell to equalise concentration.','The cell will undergo plasmolysis immediately.'],correct:1,solution:'Water moves by osmosis from a region of higher water potential (less negative) to lower water potential (more negative). The solution at −250 kPa has a higher water potential than the cell at −400 kPa, so water moves into the cell.'},
    {question:'In a cross between two heterozygous tall pea plants (Tt × Tt), what is the probability that a randomly selected offspring is tall?',options:['25%','50%','67%','75%','100%'],correct:3,solution:'Tt × Tt gives: TT (25%), Tt (50%), tt (25%). Tall phenotype = TT + Tt = 75%. Only tt (25%) is short. Probability of tall = 75%.'},
    {question:'Which of the following is NOT a function of the liver?',options:['Deamination of excess amino acids','Synthesis of bile salts','Production of insulin to regulate blood glucose','Detoxification of alcohol and drugs','Storage of glycogen as an energy reserve'],correct:2,solution:'Insulin is produced by the beta cells of the islets of Langerhans in the pancreas, not by the liver. The liver responds to insulin by converting glucose to glycogen, but it does not synthesise insulin.'},
    {question:'During which phase of meiosis do homologous chromosomes separate from each other?',options:['Metaphase I','Anaphase I','Anaphase II','Telophase II','Prophase II'],correct:1,solution:'In Anaphase I of meiosis, spindle fibres pull homologous chromosome pairs apart to opposite poles of the cell. Sister chromatids remain joined at the centromere. It is not until Anaphase II that sister chromatids separate.'},
    {question:'Which type of tissue is primarily responsible for transport in plants?',options:['Parenchyma','Collenchyma','Sclerenchyma','Xylem and phloem','Epidermis'],correct:3,solution:'Xylem transports water and minerals from roots to leaves (transpiration stream). Phloem transports organic nutrients (sugars) from photosynthetic tissues to other parts of the plant (translocation).'},
    {question:'In the light-dependent reactions of photosynthesis, what is the primary electron acceptor?',options:['NADP+','ATP synthase','Plastoquinone','Cytochrome b6f','Oxygen'],correct:0,solution:'NADP+ is the final electron acceptor in the light-dependent reactions. It accepts electrons from photosystem I via ferredoxin to form NADPH, which is used in the Calvin cycle.'},
    {question:'Which of the following is an example of a vestigial structure in humans?',options:['Appendix','Heart','Lungs','Brain','Kidneys'],correct:0,solution:'The appendix is considered a vestigial structure — it has lost most or all of its original function through evolution. It may have been involved in digesting cellulose in herbivorous ancestors but now has minimal function in humans.'},
    {question:'What is the role of ribosomes in protein synthesis?',options:['Transcribe DNA into mRNA','Translate mRNA into polypeptide chains','Replicate DNA','Regulate gene expression','Modify proteins after translation'],correct:1,solution:'Ribosomes are the site of translation. They read mRNA codons and assemble amino acids into polypeptide chains according to the genetic code. Transcription is carried out by RNA polymerase, not ribosomes.'},
    {question:'Which type of muscle tissue is striated and under voluntary control?',options:['Smooth muscle','Cardiac muscle','Skeletal muscle','All muscle types','None of the above'],correct:2,solution:'Skeletal muscle is striated (has alternating light and dark bands visible under microscopy) and is under voluntary control. Cardiac muscle is also striated but involuntary. Smooth muscle is neither striated nor voluntary.'},
    {question:'Which process converts glucose to pyruvate in the cytoplasm?',options:['Krebs cycle','Glycolysis','Electron transport chain','Calvin cycle','Fermentation'],correct:1,solution:'Glycolysis is the metabolic pathway that converts glucose into pyruvate in the cytoplasm, producing ATP and NADH. It occurs in both aerobic and anaerobic conditions.'},
    {question:'In a population of 500 individuals, 125 are homozygous dominant (AA), 250 are heterozygous (Aa), and 125 are homozygous recessive (aa). What is the frequency of the dominant allele A?',options:['0.25','0.50','0.75','0.80','1.00'],correct:1,solution:'Total alleles = 500 × 2 = 1000. A alleles = (125 × 2) + 250 = 500. Frequency = 500/1000 = 0.50.'},
    {question:'Which of the following is a characteristic of prokaryotic cells?',options:['Presence of membrane-bound nucleus','Linear DNA in multiple chromosomes','Absence of membrane-bound organelles','Large ribosomes (80S)','Mitochondria for energy production'],correct:0,solution:'Prokaryotic cells lack membrane-bound organelles (including nucleus, mitochondria, endoplasmic reticulum). They have circular DNA, smaller ribosomes (70S), and no mitochondria.'},
    {question:'The Calvin cycle occurs in which part of the chloroplast?',options:['Thylakoid membrane','Stroma','Granum','Outer membrane','Inner membrane'],correct:1,solution:'The Calvin cycle (light-independent reactions) occurs in the stroma of the chloroplast. The light-dependent reactions occur in the thylakoid membranes.'},
    {question:'In a food chain, only about 10% of energy is transferred from one trophic level to the next. Where does most of the remaining energy go?',options:['Used for growth and reproduction','Lost as heat through respiration','Stored as fat in the organism','Excreted as waste','Used for movement'],correct:1,solution:'According to the 10% rule, approximately 90% of energy at each trophic level is lost as heat through metabolic processes (cellular respiration). This is why food chains are typically limited to 4-5 levels.'},
    {question:'Which of the following is an example of convergent evolution?',options:['Wings of bats and birds','Darwin\'s finches on the Galápagos Islands','Homologous structures in human arms and whale flippers','Domestic dogs bred from wolves','Peppered moths during industrial revolution'],correct:0,solution:'Convergent evolution occurs when unrelated species evolve similar traits due to similar environmental pressures. Bats (mammals) and birds evolved wings independently but serve the same function of flight. The other options represent divergent evolution, homology, artificial selection, or natural selection within a species.'},
    {question:'Enzymes are biological catalysts. Which statement correctly describes how they work?',options:['They are consumed during the reaction','They increase the activation energy required','They provide an alternative reaction pathway with lower activation energy','They work equally well at all temperatures and pH levels','They change the equilibrium position of the reaction'],correct:2,solution:'Enzymes work by providing an alternative reaction pathway with a lower activation energy. They are not consumed, have optimal temperature and pH ranges, and do not change the equilibrium — only the rate at which equilibrium is reached.'},
    {question:'Which transport mechanism allows glucose to enter cells against its concentration gradient?',options:['Simple diffusion','Facilitated diffusion','Osmosis','Active transport','Bulk transport'],correct:3,solution:'Glucose often enters cells against its concentration gradient via active transport (e.g., sodium-glucose symporter in intestinal cells). This requires ATP energy. Facilitated diffusion would move glucose down its concentration gradient.'},
    {question:'During aerobic respiration, where in the cell does the Krebs cycle occur?',options:['Cytoplasm','Inner mitochondrial membrane','Mitochondrial matrix','Outer mitochondrial membrane','Nucleus'],correct:2,solution:'The Krebs cycle (citric acid cycle) occurs in the mitochondrial matrix. Glycolysis occurs in the cytoplasm, and the electron transport chain occurs on the inner mitochondrial membrane.'},
    {question:'A resting neuron has a membrane potential of approximately −70 mV. What primarily maintains this resting potential?',options:['High concentration of Na⁺ inside the cell','High concentration of K⁺ inside the cell and selective permeability to K⁺','Active transport of Ca²⁺ out of the cell','Equal concentrations of all ions inside and outside','The presence of negatively charged proteins outside the cell'],correct:1,solution:'The resting potential is maintained by the sodium-potassium pump (3 Na⁺ out, 2 K⁺ in) and the membrane being more permeable to K⁺ than Na⁺. K⁺ leaks out down its concentration gradient, making the inside negative relative to outside.'},
    {question:'Which hormone is primarily responsible for lowering blood glucose levels?',options:['Glucagon','Insulin','Adrenaline','Thyroxine','Cortisol'],correct:1,solution:'Insulin, secreted by pancreatic beta cells, lowers blood glucose by promoting glucose uptake into cells and glycogen synthesis. Glucagon has the opposite effect — raising blood glucose.'},
    {question:'B-cells and T-cells are types of lymphocytes. What is the primary function of B-cells?',options:['Directly kill virus-infected cells','Produce antibodies that bind to specific antigens','Coordinate the immune response','Phagocytose bacteria','Regulate blood clotting'],correct:1,solution:'B-cells differentiate into plasma cells that produce antibodies. Antibodies bind specifically to antigens, marking pathogens for destruction. T-cells include cytotoxic T-cells (kill infected cells) and helper T-cells (coordinate response).'},
    {question:'Auxin is a plant hormone that promotes cell elongation. In which direction does auxin primarily move in plants?',options:['From roots to shoots (acropetal)','From shoots to roots (basipetal)','Laterally across the stem','Only through the xylem','Only through the phloem'],correct:1,solution:'Auxin is primarily synthesised in shoot apical meristems and moves downwards (basipetally) through the plant. This polar auxin transport regulates tropisms like phototropism and gravitropism.'},
    {question:'Polymerase Chain Reaction (PCR) is used to amplify DNA. What is the role of primers in this process?',options:['To unwind the DNA double helix','To provide a starting point for DNA polymerase','To synthesise new DNA strands','To separate DNA fragments by size','To detect the amplified DNA'],correct:1,solution:'Primers are short DNA sequences complementary to the target region. They anneal to the template DNA and provide a free 3\'-OH group for DNA polymerase to begin synthesis. Without primers, DNA polymerase cannot initiate DNA synthesis.'},
    {question:'In population ecology, what is the carrying capacity (K) of an environment?',options:['The maximum number of species that can coexist','The maximum population size that can be supported indefinitely','The rate at which a population grows','The minimum viable population size','The number of births minus deaths per year'],correct:1,solution:'Carrying capacity (K) is the maximum population size of a species that an environment can sustain indefinitely, given available resources. It accounts for limitations like food, water, space, and other environmental factors.'},
    {question:'Which of the following best describes the fluid mosaic model of cell membranes?',options:['Rigid layers of proteins sandwiched between lipids','A lipid bilayer with proteins embedded in a fluid matrix','A continuous protein layer with lipids trapped inside','A static structure with fixed positions for all molecules','A single layer of phospholipids with proteins on the surface'],correct:1,solution:'The fluid mosaic model describes the membrane as a fluid phospholipid bilayer with proteins embedded within or attached to it. The lipids can move laterally (fluid), and the proteins are scattered like tiles in a mosaic.'},
    {question:'In the lac operon of E. coli, what happens when lactose is present and glucose is absent?',options:['The repressor binds to the operator, blocking transcription.','Lactose binds to the repressor, inactivating it; CAP-cAMP complex activates transcription.','Lactose binds to the repressor, activating it; CAP-cAMP complex represses transcription.','Both the repressor and CAP-cAMP complex bind, resulting in no transcription.','The operon is permanently off regardless of conditions.'],correct:1,solution:'When lactose is present, allolactose (derived from lactose) binds to the lac repressor, causing it to detach from the operator. When glucose is absent, cAMP levels rise, forming the CAP-cAMP complex that binds to the promoter, enhancing RNA polymerase binding and transcription.'},
    {question:'Which of the following correctly describes the difference between competitive and non-competitive enzyme inhibition?',options:['Competitive inhibitors bind at the active site; non-competitive bind elsewhere but affect the active site shape.','Non-competitive inhibitors bind at the active site; competitive bind elsewhere but affect the active site shape.','Both bind at the active site but have different affinities.','Both bind elsewhere but affect the active site shape differently.','Competitive inhibition is irreversible; non-competitive is reversible.'],correct:0,solution:'Competitive inhibitors have a structure similar to the substrate and compete for the active site. Non-competitive inhibitors bind to an allosteric site, changing the enzyme\'s conformation and reducing its activity. Competitive inhibition can be overcome by increasing substrate concentration; non-competitive cannot.'},
    {question:'What is the primary role of the loop of Henle in the nephron?',options:['Filtration of blood to form urine','Reabsorption of glucose and amino acids','Creation of a concentration gradient in the medulla for water reabsorption','Secretion of hydrogen ions to regulate blood pH','Storage of urine before excretion'],correct:2,solution:'The loop of Henle creates a concentration gradient in the kidney medulla through countercurrent multiplication. The descending limb is permeable to water, the ascending limb actively pumps out Na⁺ and Cl⁻. This gradient allows the collecting duct to reabsorb water under ADH influence.'},
    {question:'Which type of muscle contraction occurs when a muscle shortens while generating force?',options:['Isometric contraction','Isotonic concentric contraction','Isotonic eccentric contraction','Tetanic contraction','Plastic contraction'],correct:1,solution:'Isotonic concentric contraction occurs when a muscle shortens while generating tension (e.g., lifting a weight). Isotonic eccentric contraction is when the muscle lengthens under tension (e.g., lowering a weight). Isometric contraction occurs when the muscle generates tension without changing length.'},
    {question:'In the context of plant reproduction, what is the primary function of the pollen tube?',options:['To protect the pollen grain from desiccation','To deliver sperm cells to the ovule for fertilisation','To attract pollinators with bright colours','To produce the female gametophyte','To store nutrients for the developing embryo'],correct:1,solution:'After landing on a compatible stigma, the pollen grain germinates and produces a pollen tube that grows down through the style to the ovary. The pollen tube delivers the sperm cells to the ovule, enabling fertilisation of the egg cell and polar nuclei.'},
    {question:'Which of the following is NOT a characteristic of viruses?',options:['They contain genetic material (DNA or RNA)','They have a protein coat called a capsid','They can replicate independently of a host cell','They are obligate intracellular parasites','They can infect all types of organisms'],correct:2,solution:'Viruses cannot replicate independently — they must hijack a host cell\'s machinery to reproduce. They lack ribosomes and other cellular structures, making them dependent on host cells for protein synthesis and energy production.'},
    {question:'What is the role of the sodium-potassium pump in maintaining membrane potential?',options:['It pumps 3 Na⁺ in and 2 K⁺ out, using ATP','It pumps 3 Na⁺ out and 2 K⁺ in, using ATP','It pumps equal amounts of Na⁺ and K⁺ in both directions','It allows passive diffusion of Na⁺ and K⁺ down their gradients','It pumps 2 Na⁺ out and 3 K⁺ in, using ATP'],correct:1,solution:'The Na⁺/K⁺-ATPase pump actively transports 3 sodium ions out of the cell and 2 potassium ions into the cell against their concentration gradients, using ATP. This creates the electrochemical gradient essential for nerve impulse transmission, secondary active transport, and osmotic balance.'},
    {question:'Which of the following correctly describes the process of translation initiation in prokaryotes?',options:['The small ribosomal subunit binds directly to the start codon on mRNA.','The small ribosomal subunit binds to the Shine-Dalgarno sequence, then scans for the start codon.','The large ribosomal subunit binds first, then recruits the small subunit.','Initiation factors are not required in prokaryotes.','The ribosome binds to the 5\' cap of mRNA.'],correct:1,solution:'In prokaryotes, the small ribosomal subunit (30S) binds to the Shine-Dalgarno sequence upstream of the start codon (AUG). This positions the ribosome correctly. The initiator tRNA (fMet-tRNA) then binds, followed by the large ribosomal subunit (50S) to form the complete 70S ribosome.'},
    {question:'In a dihybrid cross (AaBb × AaBb) with independent assortment, what proportion of offspring will have the genotype AAbb?',options:['1/16','1/8','1/4','3/16','9/16'],correct:0,solution:'Probability of AA = 1/4. Probability of bb = 1/4. Since genes assort independently, probability of AAbb = 1/4 × 1/4 = 1/16.'},
    {question:'Which of the following is an example of post-transcriptional gene regulation?',options:['DNA methylation preventing transcription','Alternative splicing of pre-mRNA','Histone acetylation opening chromatin','Promoter methylation','Transcription factor binding'],correct:1,solution:'Alternative splicing occurs after transcription but before translation. Different exons can be included or excluded from the mature mRNA, producing different protein isoforms from a single gene. This allows a single gene to encode multiple proteins with different functions.'},
    {question:'What is the primary function of the sinoatrial (SA) node in the heart?',options:['To delay the electrical signal between atria and ventricles','To initiate the electrical impulse that causes atrial contraction','To coordinate ventricular contraction','To regulate blood pressure through baroreceptor feedback','To produce hormones that affect heart rate'],correct:1,solution:'The SA node, located in the right atrium, is the natural pacemaker of the heart. It spontaneously depolarises, generating electrical impulses that spread through the atria, causing atrial contraction (atrial systole). The signal then travels to the AV node, Bundle of His, and Purkinje fibres.'},
    {question:'In the context of ecosystem dynamics, what is the difference between a primary and secondary succession?',options:['Primary succession occurs on bare rock; secondary occurs where soil already exists.','Primary succession occurs after a forest fire; secondary occurs on bare rock.','Primary succession is faster than secondary succession.','Primary succession involves only pioneer species; secondary involves climax species.','Secondary succession requires human intervention.'],correct:0,solution:'Primary succession occurs on lifeless surfaces where no soil exists (e.g., after a volcanic eruption or glacial retreat). It begins with pioneer species like lichens that help form soil. Secondary succession occurs in areas where soil already exists but the community has been disturbed (e.g., after a fire or farming).'},
    {question:'Which of the following hormones is produced by the adrenal medulla?',options:['Cortisol','Aldosterone','Adrenaline (epinephrine)','ACTH','Insulin'],correct:2,solution:'The adrenal medulla produces catecholamines: adrenaline (epinephrine) and noradrenaline (norepinephrine). These are released in response to stress and increase heart rate, blood pressure, and blood glucose (fight-or-flight response). The adrenal cortex produces cortisol, aldosterone, and androgens.'},
    {question:'What is the role of telomerase in eukaryotic cells?',options:['To remove introns from pre-mRNA','To replicate the ends of linear chromosomes','To synthesise primers during DNA replication','To repair double-strand DNA breaks','To regulate gene expression through methylation'],correct:1,solution:'Telomerase is an enzyme that adds telomeric repeats (TTAGGG in humans) to the ends of chromosomes. This counteracts the end-replication problem, where DNA polymerase cannot fully replicate the 3\' ends of linear DNA. Telomerase is active in germ cells and stem cells but typically inactive in most somatic cells.'}
  ]},
  {id:'chemistry', name:'Chemistry', section:'Section 3', icon:'fa-flask', desc:'Atomic structure, bonding, organic chemistry, stoichiometry, and physical chemistry.', questions:[
    {question:'What is the electron configuration of the Fe²⁺ ion (Fe, Z = 26)?',options:['[Ar] 3d⁶','[Ar] 3d⁵ 4s¹','[Ar] 3d⁴ 4s²','[Ar] 3d⁶ 4s²','[Ar] 3d⁸'],correct:0,solution:'Neutral Fe: [Ar] 3d⁶ 4s². When forming Fe²⁺, electrons are removed from the highest principal quantum number first. 4s has n=4 > 3d\'s n=3, so both electrons leave the 4s orbital. Fe²⁺: [Ar] 3d⁶.'},
    {question:'Which compound contains both ionic and covalent bonding?',options:['Sodium chloride (NaCl)','Carbon dioxide (CO₂)','Ammonium nitrate (NH₄NO₃)','Magnesium oxide (MgO)','Chlorine gas (Cl₂)'],correct:2,solution:'Ammonium nitrate has both: ionic bonding between NH₄⁺ and NO₃⁻ ions, and covalent bonding within NH₄⁺ (N-H bonds) and within NO₃⁻ (N-O bonds).'},
    {question:'20.0 g of CaCO₃ (M = 100 g/mol) decomposes to CaO + CO₂. What volume of CO₂ at RTP (1 mol = 24.0 dm³)?',options:['2.4 dm³','4.8 dm³','6.0 dm³','12.0 dm³','24.0 dm³'],correct:1,solution:'Moles of CaCO₃ = 20.0/100 = 0.200 mol. Moles of CO₂ = 0.200 mol (1:1 ratio). Volume at RTP = 0.200 × 24.0 = 4.8 dm³.'},
    {question:'Which statement about the periodic table is correct?',options:['Atomic radius increases left to right across a period.','First ionisation energy decreases down Group 2.','Electronegativity increases down Group 17.','The most reactive metals are found in the top-left.','Melting points increase down Group 7.'],correct:1,solution:'Descending Group 2, each element has an additional electron shell. Outer electrons are further from nucleus and more shielded, so less energy is needed to remove them.'},
    {question:'What is the correct IUPAC name for CH₃CH(Cl)CH₂CH₃?',options:['1-chlorobutane','2-chlorobutane','3-chlorobutane','1-chloro-2-methylpropane','sec-butyl chloride'],correct:1,solution:'Longest chain = 4 carbons → butane. Cl is on carbon 2 from either end. Result: 2-chlorobutane.'},
    {question:'A weak acid HA has Ka = 1.8 × 10⁻⁵. What is the approximate pH of a 0.10 mol/dm³ solution?',options:['1.0','2.7','3.7','4.7','5.7'],correct:1,solution:'For a weak acid: [H⁺] ≈ √(Ka × c) = √(1.8 × 10⁻⁵ × 0.10) ≈ 0.00134 mol/dm³. pH = -log(0.00134) ≈ 2.87 ≈ 2.7.'},
    {question:'Which of the following molecules has a tetrahedral shape and a bond angle of approximately 109.5°?',options:['BF₃','H₂O','NH₃','CH₄','SO₂'],correct:3,solution:'CH₄ has four bonding pairs and no lone pairs around the central carbon, giving a perfect tetrahedral geometry with bond angles of 109.5°. NH₃ is trigonal pyramidal (~107°), H₂O is bent (~104.5°), BF₃ is trigonal planar (120°), and SO₂ is bent.'},
